services:
  - type: web
    name: employee-dialog-training
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py
    disk:
      name: training-data
      mountPath: /var/data/employee-training
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: TRAINING_DATA_DIR
        value: /var/data/employee-training
      - key: OPENAI_API_KEY
        sync: false
