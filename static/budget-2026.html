<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 預算達成儀表板 | 共好平台</title>
<style>
  /* ============== 主題色 ============== */
  :root {
    --gold: #B8860B;
    --gold-dark: #8B6508;
    --gold-light: #DDB246;
    --cream: #f3e8dc;
    --cream-deep: #e8d9c4;
    --ink: #2b1810;
    --ink-soft: #5a4a3f;
    --green: #16a34a;
    --red: #dc2626;
    --amber: #d97706;
    --gray: #94a3b8;
    --card-bg: #fdfaf4;
    --border: #d9c9b1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  /* ============== Top Bar ============== */
  .topbar {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: #fff;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(139, 101, 8, 0.18);
  }
  .topbar h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .topbar h1 .sub {
    font-size: 13px;
    font-weight: 400;
    opacity: 0.85;
    margin-left: 12px;
  }
  .back-btn {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.3); }

  /* ============== Controls ============== */
  .controls {
    background: var(--card-bg);
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  .ctrl-label {
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .toggle {
    display: inline-flex;
    background: var(--cream-deep);
    border-radius: 6px;
    padding: 3px;
  }
  .toggle button {
    border: none;
    background: transparent;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    color: var(--ink-soft);
    transition: all 0.2s;
  }
  .toggle button.active {
    background: var(--gold);
    color: #fff;
    box-shadow: 0 1px 3px rgba(184, 134, 11, 0.3);
  }
  .select {
    border: 1px solid var(--border);
    background: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink);
    min-width: 120px;
  }
  .refresh-btn {
    margin-left: auto;
    background: var(--cream-deep);
    border: 1px solid var(--border);
    color: var(--ink-soft);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .refresh-btn:hover { background: var(--gold-light); color: #fff; border-color: var(--gold-light); }
  .updated-at {
    font-size: 11px;
    color: var(--gray);
  }

  /* ============== Layout ============== */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 32px 60px;
  }

  /* ============== Section ============== */
  .section {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 3px rgba(43, 24, 16, 0.06);
    border: 1px solid var(--border);
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title .meta {
    font-size: 12px;
    font-weight: 400;
    color: var(--ink-soft);
  }

  /* ============== KPI Cards ============== */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .kpi-card {
    background: linear-gradient(180deg, #fff 0%, var(--cream) 100%);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--gold);
  }
  .kpi-card.profit::before { background: var(--green); }
  .kpi-card.cost::before { background: var(--amber); }
  .kpi-card.margin::before { background: var(--ink); }
  .kpi-label {
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .kpi-actual {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 2px;
    font-feature-settings: "tnum";
  }
  .kpi-budget {
    font-size: 11px;
    color: var(--gray);
    margin-bottom: 6px;
  }
  .kpi-pct {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .pct-good { background: rgba(22, 163, 74, 0.12); color: var(--green); }
  .pct-mid  { background: rgba(184, 134, 11, 0.15); color: var(--gold-dark); }
  .pct-bad  { background: rgba(220, 38, 38, 0.12); color: var(--red); }
  .pct-na   { background: var(--cream-deep); color: var(--gray); }

  /* ============== Trend Bars ============== */
  .trend {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 6px;
    height: 220px;
    padding-bottom: 30px;
    position: relative;
  }
  .trend-month {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    position: relative;
  }
  .bar-pair {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    width: 100%;
    height: 100%;
    padding: 0 6px;
  }
  .bar {
    flex: 1;
    border-radius: 3px 3px 0 0;
    transition: opacity 0.2s;
    position: relative;
    min-height: 1px;
  }
  .bar:hover { opacity: 0.8; cursor: pointer; }
  .bar-budget { background: var(--cream-deep); }
  .bar-actual { background: var(--gold); }
  .trend-month.future .bar-actual { background: var(--gray); opacity: 0.3; }
  .trend-month.future .bar-budget { opacity: 0.4; }
  .trend-label {
    position: absolute;
    bottom: -22px;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .trend-month.future .trend-label { color: var(--gray); }
  .trend-legend {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .trend-legend span::before {
    content: '';
    display: inline-block;
    width: 10px; height: 10px;
    margin-right: 5px;
    border-radius: 2px;
    vertical-align: middle;
  }
  .legend-budget::before { background: var(--cream-deep); }
  .legend-actual::before { background: var(--gold); }
  .legend-future::before { background: var(--gray); opacity: 0.3; }

  /* ============== Account Table ============== */
  .acc-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .acc-table thead th {
    background: var(--cream);
    padding: 10px 12px;
    text-align: left;
    color: var(--ink-soft);
    font-weight: 600;
    font-size: 12px;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
  }
  .acc-table thead th.num { text-align: right; }
  .acc-table tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-feature-settings: "tnum";
  }
  .acc-table tbody td.num { text-align: right; }
  .acc-table tbody tr.l1-revenue { background: rgba(22, 163, 74, 0.04); }
  .acc-table tbody tr.l1-cost   { background: rgba(220, 38, 38, 0.03); }
  .acc-table tbody tr:hover { background: var(--cream); }
  .acc-table .l1-tag {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--cream-deep);
    color: var(--ink-soft);
    margin-right: 6px;
  }
  .acc-table .no-budget {
    color: var(--amber);
    font-size: 11px;
    margin-left: 4px;
  }

  /* ============== Store Ranking ============== */
  .store-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .store-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    background: #fff;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .store-rank {
    font-size: 22px;
    font-weight: 800;
    color: var(--gold);
    min-width: 32px;
    text-align: center;
  }
  .store-card.rank-1 .store-rank { color: #d4af37; }
  .store-card.rank-2 .store-rank { color: #a8a8a8; }
  .store-card.rank-3 .store-rank { color: #cd7f32; }
  .store-info { flex: 1; min-width: 0; }
  .store-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
  }
  .store-meta {
    font-size: 11px;
    color: var(--gray);
    margin-top: 1px;
  }
  .store-pct {
    font-size: 16px;
    font-weight: 700;
    text-align: right;
    min-width: 70px;
  }
  .store-amount {
    font-size: 10px;
    color: var(--ink-soft);
    text-align: right;
    margin-top: 2px;
  }

  /* ============== Loading / Empty ============== */
  .loading { color: var(--gray); padding: 40px; text-align: center; font-size: 14px; }
  .empty   { color: var(--gray); padding: 24px; text-align: center; font-size: 13px; }
  .notice {
    background: #fff8e1;
    border: 1px solid #f59e0b;
    color: #92400e;
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 13px;
  }

  /* ============== Responsive ============== */
  @media (max-width: 960px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .store-grid { grid-template-columns: repeat(2, 1fr); }
    .container { padding: 16px; }
  }
  @media (max-width: 600px) {
    .kpi-grid { grid-template-columns: 1fr; }
    .store-grid { grid-template-columns: 1fr; }
    .controls { padding: 12px 16px; }
    .topbar { padding: 14px 16px; }
    .topbar h1 { font-size: 17px; }
    .topbar h1 .sub { display: block; margin-left: 0; margin-top: 2px; }
  }
</style>
</head>
<body>

<!-- ============== Top Bar ============== -->
<div class="topbar">
  <h1>2026 預算達成儀表板 <span class="sub">共好平台 12 店 · Budget vs Actual</span></h1>
  <a href="/static/hub.html" class="back-btn">← 返回 Hub</a>
</div>

<!-- ============== Controls ============== -->
<div class="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">分母:</span>
    <div class="toggle" id="denom-toggle">
      <button data-val="passed" class="active">已過月</button>
      <button data-val="full">全年</button>
    </div>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">店別:</span>
    <select id="store-select" class="select">
      <option value="">全部 12 店</option>
    </select>
  </div>
  <button class="refresh-btn" id="refresh-btn">↻ 重新整理</button>
  <span class="updated-at" id="updated-at"></span>
</div>

<!-- ============== Body ============== -->
<div class="container">

  <div id="actual-notice"></div>

  <!-- KPI -->
  <section class="section">
    <div class="section-title">
      <span>📊 總覽 KPI</span>
      <span class="meta" id="kpi-period"></span>
    </div>
    <div class="kpi-grid" id="kpi-grid">
      <div class="loading">載入中…</div>
    </div>
  </section>

  <!-- Trend -->
  <section class="section">
    <div class="section-title">
      <span>📈 月度達成趨勢</span>
      <span class="meta">2026 全年 12 個月</span>
    </div>
    <div class="trend-legend">
      <span class="legend-budget">預算</span>
      <span class="legend-actual">實際(已過月)</span>
      <span class="legend-future">未來月(預估)</span>
    </div>
    <div class="trend" id="trend">
      <div class="loading" style="grid-column: 1/-1;">載入中…</div>
    </div>
  </section>

  <!-- Account Breakdown -->
  <section class="section">
    <div class="section-title">
      <span>📋 科目明細(39 項)</span>
      <span class="meta" id="acc-period"></span>
    </div>
    <div style="max-height: 600px; overflow-y: auto;">
      <table class="acc-table" id="acc-table">
        <thead>
          <tr>
            <th style="width: 220px;">科目</th>
            <th class="num">預算</th>
            <th class="num">實際</th>
            <th class="num">差異</th>
            <th class="num" style="width: 80px;">達成率</th>
          </tr>
        </thead>
        <tbody id="acc-tbody">
          <tr><td colspan="5" class="loading">載入中…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- Store Ranking -->
  <section class="section">
    <div class="section-title">
      <span>🏪 12 店達成率排名</span>
      <span class="meta">依銷貨達成率排序</span>
    </div>
    <div class="store-grid" id="store-grid">
      <div class="loading" style="grid-column: 1/-1;">載入中…</div>
    </div>
  </section>

</div>

<script>
// ===========================================================
// Config
// ===========================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbyF6tShTC6O4dpdDTcBSurABM_g_EIE6jAuhq7a4l10fsvk2BqdthJ-u4CTp3Z4yw4T/exec';

const state = {
  denominator: 'passed',
  store_id: '',
  _cacheBust: 0
};

const STORES = [
  { id: 1, short: '精明',  full: '台中精明店' },
  { id: 2, short: '草悟道', full: '台中草悟道店' },
  { id: 3, short: '南京',  full: '台北南京店' },
  { id: 4, short: '士林',  full: '台北士林店' },
  { id: 5, short: 'focus', full: '台南 focus 店' },
  { id: 6, short: '新竹',  full: '新竹店' },
  { id: 7, short: '板橋',  full: '新北板橋店' },
  { id: 8, short: '新店',  full: '新北小碧潭店' },
  { id: 9, short: '中壢',  full: '桃園中壢店' },
  { id: 10, short: '藝文', full: '桃園藝文店' },
  { id: 11, short: '信義', full: '台北信義 A13 店' },
  { id: 12, short: 'SKM',  full: '高雄 SKM 店' }
];

// ===========================================================
// JSONP fetch
// ===========================================================
let _cbSeq = 0;
function jsonp(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cb = '_jp_' + (++_cbSeq) + '_' + Date.now();
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('JSONP timeout: ' + action));
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cb] = function(data) {
      cleanup();
      resolve(data);
    };

    const qs = new URLSearchParams({
      action,
      callback: cb,
      _t: state._cacheBust || '',
      ...params
    });
    const script = document.createElement('script');
    script.src = API_URL + '?' + qs.toString();
    script.onerror = () => { cleanup(); reject(new Error('script load fail: ' + action)); };
    document.head.appendChild(script);
  });
}

// ===========================================================
// Formatters
// ===========================================================
function fmtMoney(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const v = Math.round(n);
  if (Math.abs(v) >= 10000000) return (v / 1000000).toFixed(1) + 'M';
  if (Math.abs(v) >= 1000000)  return (v / 1000000).toFixed(2) + 'M';
  if (Math.abs(v) >= 10000)    return (v / 10000).toFixed(1) + '萬';
  return v.toLocaleString();
}
function fmtMoneyFull(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.round(n).toLocaleString();
}
function fmtPct(p) {
  if (p === null || p === undefined || isNaN(p)) return '—';
  return p.toFixed(1) + '%';
}
function pctClass(p, opts = {}) {
  if (p === null || p === undefined) return 'pct-na';
  const { reverse = false } = opts; // reverse: 成本類,越低越好
  if (reverse) {
    if (p <= 100) return 'pct-good';
    if (p <= 110) return 'pct-mid';
    return 'pct-bad';
  }
  if (p >= 100) return 'pct-good';
  if (p >= 80)  return 'pct-mid';
  return 'pct-bad';
}

// ===========================================================
// Renderers
// ===========================================================
function renderSummary(d) {
  const grid = document.getElementById('kpi-grid');
  const periodLabel = state.denominator === 'passed'
    ? `已過月(${d.active_months[0] || '—'} ~ ${d.active_months[d.active_months.length - 1] || '—'})`
    : '全年 2026';
  document.getElementById('kpi-period').textContent = periodLabel;
  document.getElementById('acc-period').textContent = periodLabel;

  const cards = [
    {
      cls: '', label: '銷貨收入',
      actual: d.revenue.actual, budget: d.revenue.budget,
      pct: d.revenue.achievement_pct, pctOpts: {}
    },
    {
      cls: 'cost', label: '總成本',
      actual: d.cost.actual, budget: d.cost.budget,
      pct: d.cost.ratio_pct, pctOpts: { reverse: true },
      pctSuffix: ' (執行率)'
    },
    {
      cls: 'profit', label: '營業淨利',
      actual: d.profit.actual, budget: d.profit.budget,
      pct: d.profit.achievement_pct, pctOpts: {}
    },
    {
      cls: 'margin', label: '淨利率',
      actual: d.profit.margin_actual_pct,
      budget: d.profit.margin_budget_pct,
      pct: null,
      isMargin: true
    }
  ];

  grid.innerHTML = cards.map(c => {
    if (c.isMargin) {
      return `<div class="kpi-card ${c.cls}">
        <div class="kpi-label">${c.label}</div>
        <div class="kpi-actual">${fmtPct(c.actual)}</div>
        <div class="kpi-budget">預算 ${fmtPct(c.budget)}</div>
        <div class="kpi-pct ${pctClass(c.actual - c.budget + 100)}">差 ${(c.actual - c.budget).toFixed(1)} pp</div>
      </div>`;
    }
    return `<div class="kpi-card ${c.cls}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-actual" title="${fmtMoneyFull(c.actual)}">${fmtMoney(c.actual)}</div>
      <div class="kpi-budget">預算 ${fmtMoney(c.budget)}</div>
      <div class="kpi-pct ${pctClass(c.pct, c.pctOpts)}">${fmtPct(c.pct)}${c.pctSuffix || ''}</div>
    </div>`;
  }).join('');

  // 實際資料未匯入提示
  const notice = document.getElementById('actual-notice');
  if (!d.actual_data_available) {
    notice.innerHTML = `<div class="notice">
      ⚠️ <strong>實際數尚未匯入</strong> — fact_actual 分頁尚未建立或無資料。
      目前顯示的「實際 / 達成率」皆為 0。預算數據完整可用,可先檢視 12 店年度預算結構。
    </div>`;
  } else {
    notice.innerHTML = '';
  }

  // 更新時間
  document.getElementById('updated-at').textContent = '更新於 ' + new Date().toLocaleString('zh-TW', { hour12: false });
}

function renderTrend(d) {
  const series = d.series || [];
  const maxVal = Math.max(...series.map(s => Math.max(s.revenue_budget, s.revenue_actual || 0)), 1);
  const trend = document.getElementById('trend');
  trend.innerHTML = series.map(s => {
    const hB = (s.revenue_budget / maxVal) * 100;
    const hA = ((s.revenue_actual || 0) / maxVal) * 100;
    const cls = s.is_passed ? 'past' : 'future';
    const monthLabel = s.month.split('-')[1] + '月';
    const tip = `${s.month}\n預算 ${fmtMoneyFull(s.revenue_budget)}\n實際 ${fmtMoneyFull(s.revenue_actual || 0)}\n達成率 ${fmtPct(s.revenue_achievement_pct)}`;
    return `<div class="trend-month ${cls}" title="${tip}">
      <div class="bar-pair">
        <div class="bar bar-budget" style="height: ${hB}%;"></div>
        <div class="bar bar-actual" style="height: ${hA}%;"></div>
      </div>
      <div class="trend-label">${monthLabel}</div>
    </div>`;
  }).join('');
}

function renderAccountBreakdown(d) {
  const rows = d.rows || [];
  const tbody = document.getElementById('acc-tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">無資料</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const cls = r.L1 === '營業收入' ? 'l1-revenue'
              : (r.sign === '支出' ? 'l1-cost' : '');
    const noBudgetTag = (r.budget_status && r.budget_status.indexOf('未編') !== -1)
      ? '<span class="no-budget">🟡無預算</span>' : '';
    const pctDisplay = r.achievement_pct !== null
      ? `<span class="kpi-pct ${pctClass(r.achievement_pct, { reverse: r.sign === '支出' })}">${fmtPct(r.achievement_pct)}</span>`
      : '<span class="kpi-pct pct-na">—</span>';
    return `<tr class="${cls}">
      <td>
        <span class="l1-tag">${r.L1 || '-'}</span>
        ${r.account_name}${noBudgetTag}
      </td>
      <td class="num">${fmtMoney(r.budget)}</td>
      <td class="num">${fmtMoney(r.actual)}</td>
      <td class="num" style="color: ${r.diff > 0 ? 'var(--red)' : (r.diff < 0 ? 'var(--green)' : 'var(--gray)')}">
        ${r.diff > 0 ? '+' : ''}${fmtMoney(r.diff)}
      </td>
      <td class="num">${pctDisplay}</td>
    </tr>`;
  }).join('');
}

function renderStoreRanking(d) {
  const rows = d.rows || [];
  const grid = document.getElementById('store-grid');
  if (!rows.length) {
    grid.innerHTML = '<div class="empty" style="grid-column: 1/-1;">無資料</div>';
    return;
  }
  grid.innerHTML = rows.map(s => {
    return `<div class="store-card rank-${s.rank}">
      <div class="store-rank">${s.rank}</div>
      <div class="store-info">
        <div class="store-name">${s.store_name_short}</div>
        <div class="store-meta">${s.region} · ${s.manager} · ${s.store_type}</div>
      </div>
      <div>
        <div class="store-pct" style="color: ${pctColor(s.revenue_achievement_pct)}">${fmtPct(s.revenue_achievement_pct)}</div>
        <div class="store-amount">${fmtMoney(s.revenue_actual)} / ${fmtMoney(s.revenue_budget)}</div>
      </div>
    </div>`;
  }).join('');
}

function pctColor(p) {
  if (p === null || p === undefined) return 'var(--gray)';
  if (p >= 100) return 'var(--green)';
  if (p >= 80)  return 'var(--gold-dark)';
  return 'var(--red)';
}

// ===========================================================
// Load all
// ===========================================================
async function loadAll() {
  const params = {
    denominator: state.denominator,
    store_id: state.store_id
  };
  try {
    const [summary, trend, acc, ranking] = await Promise.all([
      jsonp('get_summary', params),
      jsonp('get_achievement', params),
      jsonp('get_account_breakdown', params),
      jsonp('get_store_ranking', params)
    ]);
    if (summary.error)  throw new Error('summary: ' + summary.error);
    if (trend.error)    throw new Error('trend: ' + trend.error);
    if (acc.error)      throw new Error('acc: ' + acc.error);
    if (ranking.error)  throw new Error('ranking: ' + ranking.error);

    renderSummary(summary);
    renderTrend(trend);
    renderAccountBreakdown(acc);
    renderStoreRanking(ranking);
  } catch (e) {
    document.getElementById('kpi-grid').innerHTML =
      `<div class="loading" style="grid-column: 1/-1; color: var(--red);">載入失敗:${e.message}</div>`;
    console.error(e);
  }
}

// ===========================================================
// Wire controls
// ===========================================================
function initControls() {
  // 分母 toggle
  document.getElementById('denom-toggle').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('#denom-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.denominator = btn.dataset.val;
    loadAll();
  });

  // store select
  const sel = document.getElementById('store-select');
  STORES.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.id + '. ' + s.full;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', e => {
    state.store_id = e.target.value;
    loadAll();
  });

  // refresh
  document.getElementById('refresh-btn').addEventListener('click', () => {
    state._cacheBust = Date.now();
    loadAll();
  });
}

// ===========================================================
// Init
// ===========================================================
initControls();
loadAll();
</script>
</body>
</html>
