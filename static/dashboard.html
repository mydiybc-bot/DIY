<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2026 個人請款動態儀表板</title>
    <link rel="stylesheet" href="/static/dashboard.css">
  </head>
  <body>
    <main class="dashboard-shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Expense Pulse 2026</p>
          <h1>個人請款動態儀表板</h1>
          <p class="hero-text">自動掃描 2026 請款表，整理請款總額、月份趨勢、單位占比與逐筆明細。</p>
        </div>
        <div class="hero-actions">
          <button id="refresh-button" type="button">重新整理資料</button>
          <a class="ghost-link" href="/">回到原系統</a>
        </div>
      </section>

      <section class="status-strip">
        <p id="refresh-status">正在讀取資料...</p>
        <p id="source-path"></p>
      </section>

      <section class="panel filters-panel">
        <div class="filter-grid">
          <label class="field">
            <span>請款單位</span>
            <select id="unit-filter">
              <option value="">全部單位</option>
            </select>
          </label>
          <label class="field">
            <span>月份</span>
            <select id="month-filter">
              <option value="">全部月份</option>
            </select>
          </label>
          <label class="field search-field">
            <span>關鍵字</span>
            <input id="keyword-filter" type="search" placeholder="搜尋項目、備註、發票、檔名">
          </label>
          <label class="field checkbox-field">
            <span>明細範圍</span>
            <span class="checkbox-row">
              <input id="include-zero-filter" type="checkbox" checked>
              <span>包含 0 元項目</span>
            </span>
          </label>
        </div>
      </section>

      <section id="metric-grid" class="metric-grid"></section>

      <section class="visual-grid">
        <article class="panel chart-panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">Trend</p>
              <h2>月份請款趨勢</h2>
            </div>
            <p id="month-caption" class="section-note"></p>
          </div>
          <div id="month-chart" class="chart-stack"></div>
        </article>

        <article class="panel chart-panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">Mix</p>
              <h2>單位金額分布</h2>
            </div>
            <p id="unit-caption" class="section-note"></p>
          </div>
          <div id="unit-chart" class="chart-stack"></div>
        </article>

        <article class="panel chart-panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">Drivers</p>
              <h2>高金額項目排行</h2>
            </div>
            <p id="category-caption" class="section-note"></p>
          </div>
          <div id="category-chart" class="chart-stack"></div>
        </article>
      </section>

      <section class="panel files-panel">
        <div class="section-head">
          <div>
            <p class="section-kicker">Files</p>
            <h2>檔案摘要</h2>
          </div>
          <p id="files-caption" class="section-note"></p>
        </div>
        <div id="file-grid" class="file-grid"></div>
      </section>

      <section class="panel table-panel">
        <div class="section-head">
          <div>
            <p class="section-kicker">Records</p>
            <h2>請款明細</h2>
          </div>
          <p id="table-caption" class="section-note"></p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>單位</th>
                <th>項目</th>
                <th>金額</th>
                <th>發票號碼</th>
                <th>備註</th>
                <th>來源檔案</th>
              </tr>
            </thead>
            <tbody id="records-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/static/dashboard.js" defer></script>
  </body>
  </html>
