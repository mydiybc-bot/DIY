<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自己做烘焙聚樂部 — 整合儀表板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: #FAFAFA;
  }

  /* ===== 頂部導航列 ===== */
  .nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: linear-gradient(135deg, #8B2D1F 0%, #C4412F 100%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 100;
  }
  .nav-brand {
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    margin-right: 24px;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .nav-tabs {
    display: flex;
    gap: 4px;
    flex: 1;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 8px 18px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.85);
    font-size: 0.95rem;
    font-weight: 500;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: inherit;
  }
  .tab-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .tab-btn.active {
    background: #fff;
    color: #C4412F;
    font-weight: 600;
  }
  .nav-link {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 0.92rem;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.4);
    transition: all 0.2s;
    white-space: nowrap;
    margin-left: 12px;
  }
  .nav-link:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.7);
  }

  /* ===== 內容區 ===== */
  .content {
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    bottom: 0;
  }
  .frame {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }
  .frame.active {
    display: block;
  }

  /* ===== 載入動畫 ===== */
  .loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #999;
    font-size: 0.95rem;
    display: none;
  }
  .loading.show {
    display: block;
  }

  /* ===== 響應式（手機）===== */
  @media (max-width: 600px) {
    .nav { padding: 0 12px; height: 52px; }
    .nav-brand { font-size: 0.9rem; margin-right: 12px; }
    .tab-btn { padding: 6px 14px; font-size: 0.88rem; }
    .nav-link { font-size: 0.85rem; padding: 6px 10px; margin-left: 6px; }
    .content { top: 52px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">🧁 自己做烘焙聚樂部</div>
  <div class="nav-tabs">
    <button class="tab-btn" data-tab="pos">📊 銷售分析</button>
    <button class="tab-btn active" data-tab="zijiren">👥 會員分析</button>
    <button class="tab-btn" data-tab="reviews">⭐ Google 評論</button>
  </div>
  <a href="/pnl" class="nav-link" target="_blank" rel="noopener">📊 P&L 損益</a>
</nav>

<div class="content" id="content">
  <div class="loading" id="loading">載入中...</div>
  <!-- iframe 將動態建立 -->
</div>

<script>
(function() {
  'use strict';

  // tab 對應的子頁路徑（用絕對路徑，避免被 /dashboard 路由影響）
  var TAB_SOURCES = {
    'pos':     '/static/pos-dashboard.html',
    'zijiren': '/static/zijiren.html',
    'reviews': '/static/google-reviews.html'
  };

  var content = document.getElementById('content');
  var loading = document.getElementById('loading');
  var loadedTabs = {}; // 已建立 iframe 的 tab

  function switchTab(tabName) {
    // 切換按鈕高亮
    var buttons = document.querySelectorAll('.tab-btn');
    for (var i = 0; i < buttons.length; i++) {
      if (buttons[i].dataset.tab === tabName) {
        buttons[i].classList.add('active');
      } else {
        buttons[i].classList.remove('active');
      }
    }

    // 隱藏所有 iframe
    var frames = document.querySelectorAll('.frame');
    for (var j = 0; j < frames.length; j++) {
      frames[j].classList.remove('active');
    }

    // 如果這個 tab 還沒載入過，建立 iframe（lazy load）
    if (!loadedTabs[tabName]) {
      loading.classList.add('show');
      var iframe = document.createElement('iframe');
      iframe.className = 'frame active';
      iframe.id = 'frame-' + tabName;
      iframe.src = TAB_SOURCES[tabName];
      iframe.onload = function() {
        loading.classList.remove('show');
      };
      content.appendChild(iframe);
      loadedTabs[tabName] = true;
    } else {
      // 已載入過，直接顯示（不重新載入）
      var existing = document.getElementById('frame-' + tabName);
      if (existing) {
        existing.classList.add('active');
      }
    }
  }

  // 綁定 tab 點擊事件
  var tabButtons = document.querySelectorAll('.tab-btn');
  for (var k = 0; k < tabButtons.length; k++) {
    tabButtons[k].addEventListener('click', function(e) {
      switchTab(e.currentTarget.dataset.tab);
    });
  }

  // 預設載入會員分析
  switchTab('zijiren');
})();
</script>

</body>
</html>
