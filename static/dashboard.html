<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>烘焙DIY損益分析系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --primary: #F5A623;
  --accent: #D4841C;
  --bg: #F8F6F3;
  --card: #FFFFFF;
  --text: #2D2A26;
  --text2: #6B6560;
  --border: #E8E4DF;
  --green: #28a745;
  --red: #dc3545;
  --blue: #4A90D9;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); }

/* ===== LOGIN ===== */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: linear-gradient(135deg, #FFF8EE 0%, #FDE8C8 100%);
}
.login-box {
  background: var(--card); border-radius: 20px; padding: 48px 40px; width: 380px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08); text-align: center;
}
.login-box h1 { font-size: 22px; color: var(--accent); margin-bottom: 6px; }
.login-box .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 32px; }
.login-box .logo { font-size: 48px; margin-bottom: 16px; }
.login-input {
  width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px;
  font-size: 15px; outline: none; transition: border-color .2s;
}
.login-input:focus { border-color: var(--primary); }
.login-btn {
  width: 100%; padding: 13px; margin-top: 16px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
  transition: background .2s;
}
.login-btn:hover { background: #C0760F; }
.login-btn:disabled { opacity: .5; cursor: not-allowed; }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 20px; }

/* ===== MAIN LAYOUT ===== */
#app { display: none; }
.topbar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-left .brand { font-size: 18px; font-weight: 700; color: var(--accent); }
.topbar-left .brand-icon { font-size: 24px; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-right .company { font-size: 13px; color: var(--text2); }
.logout-btn {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
  background: transparent; color: var(--text2); font-size: 13px; cursor: pointer;
}
.logout-btn:hover { background: #f5f5f5; }

/* Filters */
.filter-bar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-group label { font-size: 13px; color: var(--text2); font-weight: 500; white-space: nowrap; }
.filter-group select {
  padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; background: #fff; outline: none;
}
.filter-group select:focus { border-color: var(--primary); }
.apply-btn {
  padding: 8px 20px; background: var(--accent); color: #fff; border: none;
  border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
}
.apply-btn:hover { background: #C0760F; }
.loading-indicator { font-size: 13px; color: var(--primary); display: none; align-items: center; gap: 6px; }
.loading-indicator.show { display: inline-flex; }

/* Content */
.main-content { padding: 20px 24px; max-width: 1440px; margin: 0 auto; }

/* KPI Cards */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
.kpi-card {
  background: var(--card); border-radius: var(--radius); padding: 18px;
  box-shadow: var(--shadow); border-left: 4px solid var(--primary);
}
.kpi-card .kpi-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.kpi-card .kpi-value { font-size: 24px; font-weight: 700; color: var(--text); }
.kpi-card .kpi-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }
.kpi-card.green { border-left-color: var(--green); }
.kpi-card.red { border-left-color: var(--red); }
.kpi-card.blue { border-left-color: var(--blue); }

/* Chart containers */
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.chart-box {
  background: var(--card); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow);
}
.chart-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--text); }
.chart-box canvas { width: 100% !important; }

/* P&L Table */
.pnl-section {
  background: var(--card); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); margin-bottom: 24px; overflow-x: auto;
}
.pnl-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
table th {
  background: #FAF6F1; padding: 10px 12px; text-align: left;
  border-bottom: 2px solid var(--border); font-weight: 600; color: var(--text2);
  position: sticky; top: 0;
}
table th.num, table td.num { text-align: right; }
table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
table tr:hover { background: #FFFBF5; }
tr.subtotal { background: #FFF8EE; font-weight: 600; }
tr.grandtotal { background: #FDE8C8; font-weight: 700; font-size: 14px; }
tr.subtotal td, tr.grandtotal td { border-bottom: 2px solid var(--primary); }
.negative { color: var(--red); }
.positive { color: var(--green); }

/* Tabs */
.tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--border); }
.tab-btn {
  padding: 10px 20px; border: none; background: transparent; font-size: 14px;
  font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all .2s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn:hover { color: var(--accent); }
.tab-panel { display: none; padding-top: 20px; }
.tab-panel.active { display: block; }

/* Footer */
.footer { text-align: center; padding: 20px; font-size: 12px; color: var(--text2); }

/* Responsive */
@media (max-width: 900px) {
  .chart-row { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .kpi-row { grid-template-columns: 1fr; }
  .topbar { padding: 10px 16px; }
  .main-content { padding: 16px; }
  .filter-bar { padding: 10px 16px; flex-direction: column; align-items: flex-start; }
}

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🧁</div>
    <h1>烘焙DIY損益分析系統</h1>
    <p class="subtitle">居好平台有限公司</p>
    <input type="password" id="pwd" class="login-input" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="login-btn" onclick="doLogin()">登　入</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="brand-icon">🧁</span>
      <span class="brand">烘焙DIY損益分析系統</span>
    </div>
    <div class="topbar-right">
      <span class="company">居好平台有限公司</span>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <label>期間</label>
      <select id="f-ym-start"></select>
      <span>～</span>
      <select id="f-ym-end"></select>
    </div>
    <div class="filter-group">
      <label>店別</label>
      <select id="f-store"><option value="all">全部店別</option></select>
    </div>
    <div class="filter-group">
      <label>區域</label>
      <select id="f-area"><option value="all">全部區域</option></select>
    </div>
    <button class="apply-btn" onclick="loadData()">🔍 查詢</button>
    <span class="loading-indicator" id="loading"><span class="spinner"></span> 載入中...</span>
  </div>

  <div class="main-content">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="overview">📊 總覽</button>
      <button class="tab-btn" data-tab="stores">🏪 店別比較</button>
      <button class="tab-btn" data-tab="pnl">📋 損益明細</button>
      <button class="tab-btn" data-tab="trend">📈 趨勢分析</button>
    </div>

    <!-- TAB: Overview -->
    <div class="tab-panel active" id="tab-overview">
      <div class="kpi-row" id="kpi-row"></div>
      <div class="chart-row">
        <div class="chart-box"><h3>📊 費用結構分析</h3><canvas id="chart-cost"></canvas></div>
        <div class="chart-box"><h3>🏪 各店營收排名</h3><canvas id="chart-store-rev"></canvas></div>
      </div>
      <div class="chart-row">
        <div class="chart-box"><h3>📈 月營收趨勢</h3><canvas id="chart-month-rev"></canvas></div>
        <div class="chart-box"><h3>💰 月淨利趨勢</h3><canvas id="chart-month-profit"></canvas></div>
      </div>
    </div>

    <!-- TAB: Store Comparison -->
    <div class="tab-panel" id="tab-stores">
      <div class="pnl-section"><h3>🏪 各店損益比較表</h3><div id="store-comp-wrap" style="overflow-x:auto;"></div></div>
    </div>

    <!-- TAB: P&L Detail -->
    <div class="tab-panel" id="tab-pnl">
      <div class="pnl-section"><h3>📋 損益明細表</h3><div id="pnl-wrap"></div></div>
    </div>

    <!-- TAB: Trend -->
    <div class="tab-panel" id="tab-trend">
      <div class="filter-group" style="margin-bottom:16px;">
        <label>分析指標</label>
        <select id="trend-metric" onchange="renderTrend()">
          <option value="營業收入">營業收入</option>
          <option value="直接成本">直接成本</option>
          <option value="人事成本">人事成本</option>
          <option value="場地成本">場地成本</option>
          <option value="營運費用">珟運費用</option>
          <option value="管理費用">管理費用</option>
          <option value="淨利">淨利</option>
        </select>
      </div>
      <div class="chart-box"><h3 id="trend-title">📈 各店月趨勢</h3><canvas id="chart-trend" style="height:400px;"></canvas></div>
    </div>

    <div class="footer">烘焙DIY損益分析系統 v2B · 居好平台有限公司 · 資料期間以主資料倉為準</div>
  </div>
</div>

<script>
/* ===== CONFIG ===== */
const API = 'https://script.google.com/macros/s/AKfycbw1FTIUr6ktBvK1uAKdljwnm0ErCJbJS-bVc79DiLl98_5YsIiPB7Bn7rdF0sXWyjfcHQ/exec';
let TOKEN='', STORES=[], ACCOUNTS=[], DATA=[], CX={};
const L1_ORDER = ['營業收入','直接成本','人事成本','場地成本','營運費用','管理費用','營業外'];
const COST_L1 = ['直接成本','人事成本','場地成本','營運費用','管理費用'];
const COLORS = ['#F5A623','#D4841C','#4A90D9','#28a745','#dc3545','#8E44AD','#1ABC9C','#E67E22','#3498DB','#E74C3C','#2ECC71','#9B59B6','#F39C12'];

/* ===== API ===== */
async function callApi(action, params={}) {
  const u = new URL(API);
  u.searchParams.set('action', action);
  if (TOKEN) u.searchParams.set('token', TOKEN);
  for (const k in params) u.searchParams.set(k, params[k]);
  const r = await fetch(u.toString());
  if (!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

/* ===== HELPERS ===== */
function sumL1(d, l1) { return d.filter(r=>r.category_l1===l1).reduce((s,r)=>s+r.amount,0); }
function calcNP(d) {
  return sumL1(d,'營業收入') - sumL1(d,'直接成本') - sumL1(d,'人事成本') - sumL1(d,'場地成本') - sumL1(d,'營運費用') - sumL1(d,'管理費用') + sumL1(d,'營業外');
}
function fmt(n) {
  if (n===0) return '0';
  const a=Math.abs(n);
  if (a>=100000000) return (n<0?'-':'')+(a/100000000).toFixed(2)+'億';
  if (a>=10000) return (n<0?'-':'')+(a/10000).toFixed(1)+'萬';
  return n.toLocaleString('zh-TW');
}
function fmtF(n) { return n.toLocaleString('zh-TW'); }
function pct(n,d) { return d===0?'—':(n/d*100).toFixed(1)+'%'; }
function ymLbl(ym) { return Math.floor(ym/100)+'/'+ String(ym%100).padStart(2,'0'); }
function sName(id) { const s=STORES.find(s=>s['店號']===id); return s?s['店別簡稱']:'店'+id; }
function dx(k) { if(CX[k]){CX[k].destroy();delete CX[k];} }
function showLoad(b) { document.getElementById('loading').classList.toggle('show',b); }

/* ===== LOGIN ===== */
async function doLogin() {
  const pwd=document.getElementById('pwd').value.trim();
  const btn=document.getElementById('login-btn'), err=document.getElementById('login-error');
  if(!pwd){err.textContent='請輸入密碼';return;}
  btn.disabled=true; btn.textContent='驗證中...'; err.textContent='';
  try {
    const r = await callApi('verify_password',{password:pwd});
    if(r.ok){ TOKEN=r.token; document.getElementById('login-screen').style.display='none'; document.getElementById('app').style.display='block'; await initApp(); }
    else { err.textContent='密碼錯誤，請重試'; }
  } catch(e) { err.textContent='連線失敗: '+e.message; }
  btn.disabled=false; btn.textContent='登　入';
}
function doLogout() {
  TOKEN=''; DATA=[];
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pwd').value='';
}

/* ===== INIT ===== */
async function initApp() {
  showLoad(true);
  try {
    const [sr,ar] = await Promise.all([callApi('get_stores'), callApi('get_accounts')]);
    STORES = sr.stores||[];
    ACCOUNTS = ar.accounts||[];
    buildFilters();
    await loadData();
  } catch(e) { alert('初始化失敗: '+e.message); }
  showLoad(false);
}

function buildFilters() {
  const yms=[]; for(let m=1;m<=12;m++) yms.push(11400+m);
  ['f-ym-start','f-ym-end'].forEach(id => {
    const sel=document.getElementById(id);
    yms.forEach(ym => sel.add(new Option('114/'+String(ym%100).padStart(2,'0'), ym)));
  });
  document.getElementById('f-ym-start').value=11401;
  document.getElementById('f-ym-end').value=11412;

  const ss=document.getElementById('f-store');
  STORES.forEach(s => ss.add(new Option(s['店別簡稱'], s['店號'])));

  const areas=[...new Set(STORES.map(s=>s['區域']))].sort();
  const as=document.getElementById('f-area');
  areas.forEach(a => as.add(new Option(a,a)));
}

/* ===== LOAD DATA ===== */
async function loadData() {
  showLoad(true);
  try {
    const ymS=document.getElementById('f-ym-start').value;
    const ymE=document.getElementById('f-ym-end').value;
    const sv=document.getElementById('f-store').value;
    const av=document.getElementById('f-area').value;
    let ids;
    if(sv!=='all') ids=sv;
    else if(av!=='all') ids=STORES.filter(s=>s['區域']===av).map(s=>s['店號']).join(',');
    else ids=STORES.map(s=>s['店號']).join(',');

    const r = await callApi('get_fact_data',{store_ids:ids, ym_min:ymS, ym_max:ymE});
    DATA = r.data||[];
    renderAll();
  } catch(e) { alert('載入失敗: '+e.message); }
  showLoad(false);
}

/* ===== RENDER ALL ===== */
function renderAll() {
  renderKPIs();
  renderCostChart();
  renderStoreRevChart();
  renderMonthRevChart();
  renderMonthProfitChart();
  renderStoreComp();
  renderPnL();
  renderTrend();
}

/* ===== KPIs ===== */
function renderKPIs() {
  const rev=sumL1(DATA,'營業收入'), dc=sumL1(DATA,'直接成本'), hr=sumL1(DATA,'人事成本');
  const site=sumL1(DATA,'場地成本'), ops=sumL1(DATA,'營運費用'), mgmt=sumL1(DATA,'管理費用');
  const gp=rev-dc, np=calcNP(DATA);
  const totalCost = dc+hr+site+ops+mgmt;
  const cards = [
    {l:'營業收入',v:fmt(rev),s:'合計',c:''},
    {l:'毛利',v:fmt(gp),s:'毛利率 '+pct(gp,rev),c:gp>=0?'green':'red'},
    {l:'人事成本',v:fmt(hr),s:'佔營收 '+pct(hr,rev),c:'blue'},
    {l:'場地成本',v:fmt(site),s:'佔營收 '+pct(site,rev),c:'blue'},
    {l:'總費用',v:fmt(totalCost),s:'佔營收 '+pct(totalCost,rev),c:''},
    {l:'淨利',v:fmt(np),s:'淨利率 '+pct(np,rev),c:np>=0?'green':'red'},
  ];
  document.getElementById('kpi-row').innerHTML = cards.map(c=>
    `<div class="kpi-card ${c.c}"><div class="kpi-label">${c.l}</div><div class="kpi-value">${c.v}</div><div class="kpi-sub">${c.s}</div></div>`
  ).join('');
}

/* ===== CHARTS ===== */
function renderCostChart() {
  dx('cost');
  const labels = ['直接成本','人事成本','場地成本','營運費用','管理費用'];
  const values = labels.map(l=>Math.abs(sumL1(DATA,l)));
  const colors = ['#D4841C','#4A90D9','#F5A623','#1ABC9C','#8E44AD'];
  CX.cost = new Chart(document.getElementById('chart-cost'),{
    type:'doughnut',
    data:{labels, datasets:[{data:values, backgroundColor:colors, borderWidth:2}]},
    options:{responsive:true, plugins:{
      legend:{position:'bottom',labels:{font:{size:12},padding:14}},
      tooltip:{callbacks:{label:c=>c.label+': '+fmtF(c.raw)}}
    }}
  });
}

function renderStoreRevChart() {
  dx('srev');
  const sids=[...new Set(DATA.map(d=>d.store_id))].sort((a,b)=>a-b);
  const srevs=sids.map(id=>({name:sName(id), rev:DATA.filter(d=>d.store_id===id&&d.category_l1==='營業收入').reduce((s,d)=>s+d.amount,0)})).sort((a,b)=>b.rev-a.rev);
  CX.srev = new Chart(document.getElementById('chart-store-rev'),{
    type:'bar',
    data:{labels:srevs.map(s=>s.name), datasets:[{label:'營收',data:srevs.map(s=>s.rev),backgroundColor:'#F5A623',borderRadius:6}]},
    options:{indexAxis:'y',responsive:true, plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtF(c.raw)}}}, scales:{x:{ticks:{callback:v=>fmt(v)}}}}
  });
}

function renderMonthRevChart() {
  dx('mrev');
  const ms=[...new Set(DATA.map(d=>d.year_month))].sort();
  const vals=ms.map(ym=>DATA.filter(d=>d.year_month===ym&&d.category_l1==='營業收入').reduce((s,d)=>s+d.amount,0));
  CX.mrev = new Chart(document.getElementById('chart-month-rev'),{
    type:'line',
    data:{labels:ms.map(ymLbl), datasets:[{label:'營收',data:vals,borderColor:'#F5A623',backgroundColor:'rgba(245,166,35,0.1)',fill:true,tension:.3,pointRadius:4,pointBackgroundColor:'#D4841C'}]},
    options:{responsive:true, plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtF(c.raw)}}}, scales:{y:{ticks:{callback:v=>fmt(v)}}}}
  });
}

function renderMonthProfitChart() {
  dx('mpro');
  const ms=[...new Set(DATA.map(d=>d.year_month))].sort();
  const vals=ms.map(ym=>{const md=DATA.filter(d=>d.year_month===ym); return calcNP(md);});
  CX.mpro = new Chart(document.getElementById('chart-month-profit'),{
    type:'bar',
    data:{labels:ms.map(ymLbl), datasets:[{label:'淨利',data:vals,backgroundColor:vals.map(v=>v>=0?'rgba(40,167,69,.7)':'rgba(220,53,69,.7)'),borderRadius:4}]},
    options:{responsive:true, plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtF(c.raw)}}}, scales:{y:{ticks:{callback:v=>fmt(v)}}}}
  });
}

/* ===== STORE COMPARISON ===== */
function renderStoreComp() {
  const sids=[...new Set(DATA.map(d=>d.store_id))].sort((a,b)=>a-b);
  const rows=sids.map(id=>{
    const sd=DATA.filter(d=>d.store_id===id);
    const rev=sumL1(sd,'營業收入'),dc=sumL1(sd,'直接成本'),hr=sumL1(sd,'人事成本');
    const site=sumL1(sd,'場地成本'),ops=sumL1(sd,'營運費用'),mgmt=sumL1(sd,'管理費用');
    const gp=rev-dc, np=calcNP(sd);
    return {name:sName(id),rev,dc,hr,site,ops,mgmt,gp,np,gpR:rev?gp/rev:0,npR:rev?np/rev:0};
  }).sort((a,b)=>b.rev-a.rev);

  let h=`<table><thead><tr><th>店別</th><th class="num">營業收入</th><th class="num">直接成本</th><th class="num">人事成本</th><th class="num">場地成本</th><th class="num">營運費用</th><th class="num">管理費用</th><th class="num">毛利</th><th class="num">毛利率</th><th class="num">淨利</th><th class="num">淨利率</th></tr></thead><tbody>`;
  let t={rev:0,dc:0,hr:0,site:0,ops:0,mgmt:0,gp:0,np:0};
  rows.forEach(r=>{
    t.rev+=r.rev;t.dc+=r.dc;t.hr+=r.hr;t.site+=r.site;t.ops+=r.ops;t.mgmt+=r.mgmt;t.gp+=r.gp;t.np+=r.np;
    h+=`<tr><td>${r.name}</td><td class="num">${fmtF(r.rev)}</td><td class="num">${fmtF(r.dc)}</td><td class="num">${fmtF(r.hr)}</td><td class="num">${fmtF(r.site)}</td><td class="num">${fmtF(r.ops)}</td><td class="num">${fmtF(r.mgmt)}</td><td class="num">${fmtF(r.gp)}</td><td class="num">${(r.gpR*100).toFixed(1)}%</td><td class="num ${r.np>=0?'positive':'negative'}">${fmtF(r.np)}</td><td class="num ${r.npR>=0?'positive':'negative'}">${(r.npR*100).toFixed(1)}%</td></tr>`;
  });
  const tgR=t.rev?t.gp/t.rev:0, tnR=t.rev?t.np/t.rev:0;
  h+=`<tr class="grandtotal"><td>合計</td><td class="num">${fmtF(t.rev)}</td><td class="num">${fmtF(t.dc)}</td><td class="num">${fmtF(t.hr)}</td><td class="num">${fmtF(t.site)}</td><td class="num">${fmtF(t.ops)}</td><td class="num">${fmtF(t.mgmt)}</td><td class="num">${fmtF(t.gp)}</td><td class="num">${(tgR*100).toFixed(1)}%</td><td class="num ${t.np>=0?'positive':'negative'}">${fmtF(t.np)}</td><td class="num ${tnR>=0?'positive':'negative'}">${(tnR*100).toFixed(1)}%</td></tr>`;
  h+='</tbody></table>';
  document.getElementById('store-comp-wrap').innerHTML=h;
}

/* ===== P&L DETAIL ===== */
function renderPnL() {
  const rev=sumL1(DATA,'營業收入');
  let h=`<table><thead><tr><th>科目分類</th><th>科目名稱</th><th class="num">金額</th><th class="num">佔營收比</th></tr></thead><tbody>`;
  let running=0;
  L1_ORDER.forEach(l1=>{
    const l1d=DATA.filter(d=>d.category_l1===l1);
    const grp={};
    l1d.forEach(d=>{
      const k=d.account_code+'_'+d.account_name;
      if(!grp[k])grp[k]={code:d.account_code,name:d.account_name,l2:d.category_l2,amt:0};
      grp[k].amt+=d.amount;
    });
    const items=Object.values(grp).sort((a,b)=>a.code.localeCompare(b.code));
    const l1t=items.reduce((s,i)=>s+i.amt,0);
    items.forEach((it,i)=>{
      h+=`<tr><td>${i===0?l1:''}</td><td style="padding-left:20px">${it.name}</td><td class="num">${fmtF(it.amt)}</td><td class="num">${pct(it.amt,rev)}</td></tr>`;
    });
    if(l1==='營業收入'){
      running=l1t;
      h+=`<tr class="subtotal"><td colspan="2">營業收入合計</td><td class="num">${fmtF(l1t)}</td><td class="num">100.0%</td></tr>`;
    } else if(l1==='直接成本'){
      const gp=running-l1t;
      h+=`<tr class="subtotal"><td colspan="2">直接成本合計</td><td class="num">${fmtF(l1t)}</td><td class="num">${pct(l1t,rev)}</td></tr>`;
      h+=`<tr class="subtotal"><td colspan="2">➤ 毛利</td><td class="num ${gp>=0?'positive':'negative'}">${fmtF(gp)}</td><td class="num">${pct(gp,rev)}</td></tr>`;
    } else {
      h+=`<tr class="subtotal"><td colspan="2">${l1}合計</td><td class="num">${fmtF(l1t)}</td><td class="num">${pct(l1t,rev)}</td></tr>`;
    }
  });
  const np=calcNP(DATA);
  h+=`<tr class="grandtotal"><td colspan="2">★ 本期淨利</td><td class="num ${np>=0?'positive':'negative'}">${fmtF(np)}</td><td class="num ${np>=0?'positive':'negative'}">${pct(np,rev)}</td></tr>`;
  h+='</tbody></table>';
  document.getElementById('pnl-wrap').innerHTML=h;
}

/* ===== TREND ===== */
function renderTrend() {
  dx('trend');
  const metric=document.getElementById('trend-metric').value;
  const ms=[...new Set(DATA.map(d=>d.year_month))].sort();
  const sids=[...new Set(DATA.map(d=>d.store_id))].sort((a,b)=>a-b);
  const ds=sids.map((id,i)=>{
    const vals=ms.map(ym=>{
      const sd=DATA.filter(d=>d.store_id===id&&d.year_month===ym);
      return metric==='淨利'?calcNP(sd):sumL1(sd,metric);
    });
    return {label:sName(id),data:vals,borderColor:COLORS[i%COLORS.length],backgroundColor:'transparent',tension:.3,pointRadius:3,borderWidth:2};
  });
  document.getElementById('trend-title').textContent='📈 各店'+metric+'月趨勢';
  CX.trend = new Chart(document.getElementById('chart-trend'),{
    type:'line', data:{labels:ms.map(ymLbl),datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12,padding:12}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmtF(c.raw)}}},
      scales:{y:{ticks:{callback:v=>fmt(v)}}},
      interaction:{mode:'index',intersect:false}
    }
  });
}

/* ===== TAB SWITCH ===== */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const tab=btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    if(tab==='trend') renderTrend();
  });
});
</script>
