<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍰 自己做烘焙聚樂部｜數據儀表板</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      overflow: hidden;
    }

    /* ── 導航列 ── */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: linear-gradient(90deg, #8B2D1F 0%, #C4412F 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    #brand {
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── 頁籤區 ── */
    #tabs-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0 8px;
      flex: 1;
      justify-content: center;
    }
    #tabs-wrapper::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 5px 14px;
      border-radius: 20px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .tab-btn:hover {
      background: rgba(255,255,255,0.35);
    }
    .tab-btn.active {
      background: #fff;
      color: #C4412F;
      font-weight: 700;
    }

    /* ── 最後更新時間 ── */
    #last-updated {
      color: rgba(255,255,255,0.7);
      font-size: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* ── 主內容區 ── */
    #main {
      position: fixed;
      top: 52px; left: 0; right: 0; bottom: 0;
    }

    /* ── iframe 共用樣式 ── */
    .frame-pane {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      display: none;
    }
    .frame-pane.visible { display: block; }

    /* ── Google 評論佔位畫面 ── */
    #placeholder-google {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff8f7 0%, #fceae7 100%);
      gap: 16px;
    }
    #placeholder-google.visible { display: flex; }

    .placeholder-icon { font-size: 64px; }
    .placeholder-title {
      font-size: 22px;
      font-weight: 700;
      color: #8B2D1F;
    }
    .placeholder-sub {
      font-size: 14px;
      color: #999;
      letter-spacing: 1px;
    }
    .placeholder-badge {
      margin-top: 8px;
      padding: 6px 18px;
      border-radius: 20px;
      background: linear-gradient(90deg, #8B2D1F, #C4412F);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- 導航列 -->
  <nav id="navbar">
    <div id="brand">🍰 自己做烘焙聚樂部</div>

    <div id="tabs-wrapper">
      <button class="tab-btn" data-tab="pos" onclick="switchTab('pos')">📊 銷售分析</button>
      <button class="tab-btn active" data-tab="member" onclick="switchTab('member')">👥 會員分析</button>
      <button class="tab-btn" data-tab="google" onclick="switchTab('google')">⭐ Google 評論</button>
    </div>

    <div id="last-updated">更新 <span id="update-time">—</span></div>
  </nav>

  <!-- 主內容 -->
  <div id="main">

    <!-- 銷售分析 iframe（lazy：尚未建立） -->
    <!-- 會員分析 iframe（預設載入） -->
    <iframe
      id="frame-member"
      class="frame-pane visible"
      src="zijiren.html"
      title="會員分析"
    ></iframe>

    <!-- Google 評論佔位畫面 -->
    <div id="placeholder-google">
      <div class="placeholder-icon">🚧</div>
      <div class="placeholder-title">Google 評論分析</div>
      <div class="placeholder-sub">建置中，敬請期待</div>
      <div class="placeholder-badge">COMING SOON</div>
    </div>

  </div>

  <script>
    // ── 狀態 ──
    const loaded = { pos: false, member: true, google: false };
    let current = 'member';

    // ── 最後更新時間 ──
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('update-time').textContent =
      `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

    // ── 取得或建立 iframe ──
    function getOrCreateFrame(tab) {
      const id = `frame-${tab}`;
      let el = document.getElementById(id);
      if (!el) {
        const srcs = { pos: 'pos-dashboard.html' };
        el = document.createElement('iframe');
        el.id = id;
        el.className = 'frame-pane';
        el.title = tab;
        el.src = srcs[tab] || '';
        document.getElementById('main').appendChild(el);
        loaded[tab] = true;
      }
      return el;
    }

    // ── 切換頁籤 ──
    function switchTab(tab) {
      if (tab === current) return;

      // 隱藏目前頁面
      if (current === 'google') {
        document.getElementById('placeholder-google').classList.remove('visible');
      } else {
        const prev = document.getElementById(`frame-${current}`);
        if (prev) prev.classList.remove('visible');
      }

      // 切換按鈕樣式
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });

      // 顯示新頁面
      if (tab === 'google') {
        document.getElementById('placeholder-google').classList.add('visible');
      } else {
        const frame = getOrCreateFrame(tab);
        frame.classList.add('visible');
      }

      current = tab;
    }
  </script>

</body>
</html>
