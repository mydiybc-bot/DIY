<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共好平台 P&L 分析系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ========== CSS Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #F5A623;
  --primary-light: #FFF3E0;
  --primary-dark: #D4841C;
  --accent: #D4841C;
  --bg: #F7F8FA;
  --card-bg: #FFFFFF;
  --text: #333333;
  --text-secondary: #666666;
  --text-muted: #999999;
  --border: #E8E8E8;
  --success: #4CAF50;
  --danger: #E53935;
  --info: #2196F3;
  --sidebar-width: 240px;
  --header-height: 56px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
  --radius: 8px;
  --radius-lg: 12px;
}
html { font-size: 14px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
a { color: var(--primary-dark); text-decoration: none; }
button { cursor: pointer; border: none; font-family: inherit; font-size: inherit; }
input, select { font-family: inherit; font-size: inherit; }
table { border-collapse: collapse; width: 100%; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { background: var(--bg); font-weight: 600; color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 1; }
td { font-size: 0.92rem; }
tbody tr:hover { background: var(--primary-light); }

/* ========== Login Page ========== */
#login-page {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #FFF8E7 0%, #FFF3E0 50%, #FFE0B2 100%);
}
.login-card {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  text-align: center;
}
.login-logo {
  width: 80px; height: 80px;
  margin: 0 auto 16px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; color: #fff; font-weight: 700;
}
.login-card h1 { font-size: 1.5rem; margin-bottom: 4px; color: var(--text); }
.login-card .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; }
.login-input-group { position: relative; margin-bottom: 20px; text-align: left; }
.login-input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.login-input-group input {
  width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: var(--radius);
  font-size: 1rem; transition: border-color 0.2s; outline: none;
}
.login-input-group input:focus { border-color: var(--primary); }
.login-btn {
  width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff; font-size: 1rem; font-weight: 600; border-radius: var(--radius);
  transition: opacity 0.2s, transform 0.1s;
}
.login-btn:hover { opacity: 0.92; }
.login-btn:active { transform: scale(0.98); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.login-error { color: var(--danger); font-size: 0.85rem; margin-top: 12px; min-height: 20px; }

/* ========== App Layout ========== */
#app-container { display: none; min-height: 100vh; }
.sidebar {
  position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh;
  background: #1A1A2E; color: #fff; z-index: 100; display: flex; flex-direction: column;
  transition: transform 0.3s ease;
}
.sidebar-brand {
  padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; gap: 12px;
}
.sidebar-brand-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; font-weight: 700; flex-shrink: 0;
}
.sidebar-brand-text h2 { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
.sidebar-brand-text span { font-size: 0.7rem; opacity: 0.6; }
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 20px;
  color: rgba(255,255,255,0.65); font-size: 0.9rem; font-weight: 500;
  transition: all 0.2s; cursor: pointer; border-left: 3px solid transparent;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
.nav-item.active { color: var(--primary); background: rgba(245,166,35,0.1); border-left-color: var(--primary); }
.nav-item .nav-icon { font-size: 1.1rem; width: 24px; text-align: center; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
.logout-btn {
  display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.5);
  font-size: 0.85rem; background: none; padding: 8px 0; width: 100%; transition: color 0.2s;
}
.logout-btn:hover { color: var(--danger); }
.main-content {
  margin-left: var(--sidebar-width); min-height: 100vh; display: flex; flex-direction: column;
}
.top-bar {
  background: var(--card-bg); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: var(--header-height); display: flex;
  align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50;
}
.top-bar h1 { font-size: 1.15rem; font-weight: 600; }
.top-bar-right { display: flex; align-items: center; gap: 16px; font-size: 0.85rem; color: var(--text-muted); }
.hamburger {
  display: none; background: none; font-size: 1.4rem; color: var(--text); padding: 4px;
}
.page-content { flex: 1; padding: 24px; }
.page { display: none; }
.page.active { display: block; }

/* ========== Components ========== */
.card {
  background: var(--card-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow);
  padding: 24px; margin-bottom: 20px;
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-title { font-size: 1rem; font-weight: 600; color: var(--text); }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
.kpi-card {
  background: var(--card-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow);
  padding: 20px; position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: var(--primary); border-radius: 4px 0 0 4px;
}
.kpi-card.green::before { background: var(--success); }
.kpi-card.red::before { background: var(--danger); }
.kpi-card.blue::before { background: var(--info); }
.kpi-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-value { font-size: 1.6rem; font-weight: 700; color: var(--text); margin: 6px 0 2px; }
.kpi-sub { font-size: 0.78rem; color: var(--text-muted); }
.chart-container { position: relative; width: 100%; }
.chart-container.h300 { height: 300px; }
.chart-container.h350 { height: 350px; }
.chart-container.h400 { height: 400px; }
.filters { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; align-items: center; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.filter-group select, .filter-group input {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
  background: #fff; font-size: 0.88rem; min-width: 140px; outline: none;
}
.filter-group select:focus, .filter-group input:focus { border-color: var(--primary); }
.btn {
  padding: 8px 18px; border-radius: 6px; font-size: 0.88rem; font-weight: 500;
  transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--accent); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 5px 12px; font-size: 0.8rem; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
.badge-success { background: #E8F5E9; color: #2E7D32; }
.badge-danger { background: #FFEBEE; color: #C62828; }
.badge-warning { background: #FFF8E1; color: #F57F17; }
.badge-info { background: #E3F2FD; color: #1565C0; }
.text-right { text-align: right; }
.text-center { text-align: center; }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-muted { color: var(--text-muted); }
.fw-600 { font-weight: 600; }
.mt-12 { margin-top: 12px; }
.mt-20 { margin-top: 20px; }
.mb-12 { margin-bottom: 12px; }
.mb-20 { margin-bottom: 20px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.table-wrapper { overflow-x: auto; max-height: 500px; overflow-y: auto; border-radius: var(--radius); border: 1px solid var(--border); }
.table-wrapper table { margin: 0; }
.l1-row { background: #FFF8E1 !important; font-weight: 700; }
.l1-row td { border-top: 2px solid var(--primary); }
.subtotal-row { background: #FFFDE7; font-weight: 600; font-style: italic; }
.total-row { background: var(--primary-light) !important; font-weight: 700; font-size: 1rem; }
.total-row td { border-top: 2px solid var(--primary); border-bottom: 2px solid var(--primary); }

/* Loading spinner */
.spinner-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;
  background: rgba(255,255,255,0.85); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
}
.spinner {
  width: 48px; height: 48px; border: 4px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-text { color: var(--text-secondary); font-size: 0.9rem; }

/* Toggle switch */
.toggle-group { display: flex; gap: 4px; background: var(--bg); border-radius: 6px; padding: 3px; }
.toggle-btn {
  padding: 6px 14px; border-radius: 4px; font-size: 0.82rem; font-weight: 500;
  background: transparent; color: var(--text-secondary); transition: all 0.2s;
}
.toggle-btn.active { background: var(--primary); color: #fff; }

/* Top/Bottom highlighting */
.rank-top { background: #E8F5E9 !important; }
.rank-bottom { background: #FFEBEE !important; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .hamburger { display: block; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .grid-2 { grid-template-columns: 1fr; }
  .page-content { padding: 16px; }
  .card { padding: 16px; }
  .filters { flex-direction: column; align-items: stretch; }
  .filter-group select { min-width: 100%; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .login-card { margin: 16px; padding: 32px 24px; }
}

/* Sidebar overlay for mobile */
.sidebar-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.4); z-index: 99;
}
.sidebar-overlay.show { display: block; }

/* Drill-down pointer */
.clickable-row { cursor: pointer; }
.clickable-row:hover { background: var(--primary-light) !important; }

/* Checkbox style */
.cb-label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; }
.cb-label input[type="checkbox"] { accent-color: var(--primary); }
</style>
</head>
<body>

<!-- ========== LOGIN PAGE ========== -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">共好</div>
    <h1>共好平台有限公司</h1>
    <p class="subtitle">烘焙DIY連鎖 P&L 分析系統</p>
    <div class="login-input-group">
      <label for="login-password">密碸</label>
      <input type="password" id="login-password" placeholder="請輸入系統密碼" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">登入</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ========== LOADING OVERLAY ========== -->
<div class="spinner-overlay" id="loading-overlay" style="display:none;">
  <div class="spinner"></div>
  <div class="spinner-text" id="loading-text">載入資料中...</div>
</div>

<!-- ========== APP CONTAINER ========== -->
<div id="app-container">
  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">共好</div>
      <div class="sidebar-brand-text">
        <h2>P&L 分析系統</h2>
        <span>v2.0</span>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-page="overview" onclick="navigateTo('overview')">
        <span class="nav-icon">&#128202;</span> 總覽
      </div>
      <div class="nav-item" data-page="comparison" onclick="navigateTo('comparison')">
        <span class="nav-icon">&#128200;</span> 門店比較
      </div>
      <div class="nav-item" data-page="store-detail" onclick="navigateTo('store-detail')">
        <span class="nav-icon">&#127978;</span> 單店明細
      </div>
      <div class="nav-item" data-page="trends" onclick="navigateTo('trends')">
        <span class="nav-icon">&#128201;</span> 月度趨勢
      </div>
      <div class="nav-item" data-page="accounts" onclick="navigateTo('accounts')">
        <span class="nav-icon">&#128209;</span> 科目分析
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">
        <span>&#x23FB;</span> 登出
      </button>
      <div style="font-size:0.7rem; opacity:0.4; margin-top:8px;" id="sidebar-updated"></div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <header class="top-bar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
        <h1 id="page-title">總覽</h1>
      </div>
      <div class="top-bar-right">
        <span id="topbar-freshness"></span>
      </div>
    </header>

    <div class="page-content">

      <!-- ===== PAGE: OVERVIEW ===== -->
      <div class="page active" id="page-overview">
        <div class="filters">
          <div class="filter-group">
            <label>期間範圍</label>
            <select id="ov-period" onchange="renderOverview()"></select>
          </div>
        </div>
        <div class="kpi-grid" id="ov-kpi"></div>
        <div class="grid-2">
          <div class="card">
            <div class="card-header"><span class="card-title">月營收趨勢</span></div>
            <div class="chart-container h300"><canvas id="ov-chart-trend"></canvas></div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">門店營收排行</span></div>
            <div class="chart-container h300"><canvas id="ov-chart-rank"></canvas></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">各店損益摘要</span></div>
          <div class="table-wrapper" id="ov-table-wrap"></div>
        </div>
      </div>

      <!-- ===== PAGE: COMPARISON ===== -->
      <div class="page" id="page-comparison">
        <div class="filters">
          <div class="filter-group">
            <label>期間範圍</label>
            <select id="cmp-period" onchange="renderComparison()"></select>
          </div>
          <div class="filter-group">
            <label>指標</label>
            <select id="cmp-metric" onchange="renderComparison()">
              <option value="revenue">營收</option>
              <option value="cost">總成本</option>
              <option value="gross_profit">毛利</option>
              <option value="gross_margin">毛利率 (%)</option>
              <option value="net_profit">淨利</option>
              <option value="net_margin">淨利率 (%)</option>
            </select>
          </div>
          <div class="filter-group" style="justify-content:flex-end;">
            <label>&nbsp;</label>
            <label class="cb-label"><input type="checkbox" id="cmp-show-closed" onchange="renderComparison()"> 顯示已關閉門店</label>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title" id="cmp-chart-title">門店比較</span></div>
          <div class="chart-container h400"><canvas id="cmp-chart"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">比較明細表</span></div>
          <div class="table-wrapper" id="cmp-table-wrap"></div>
        </div>
      </div>

      <!-- ===== PAGE: STORE DETAIL ===== -->
      <div class="page" id="page-store-detail">
        <div class="filters">
          <div class="filter-group">
            <label>選擇門店</label>
            <select id="sd-store" onchange="renderStoreDetail()"></select>
          </div>
          <div class="filter-group">
            <label>期間範圍</label>
            <select id="sd-period" onchange="renderStoreDetail()"></select>
          </div>
        </div>
        <div class="kpi-grid" id="sd-kpi"></div>
        <div class="grid-2">
          <div class="card">
            <div class="card-header"><span class="card-title">月營收趨勢</span></div>
            <div class="chart-container h300"><canvas id="sd-chart-trend"></canvas></div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">成本結構</span></div>
            <div class="chart-container h300"><canvas id="sd-chart-cost"></canvas></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">損益明細表 (P&L)</span></div>
          <div class="table-wrapper" id="sd-table-wrap"></div>
        </div>
      </div>

      <!-- ===== PAGE: TRENDS ===== -->
      <div class="page" id="page-trends">
        <div class="filters">
          <div class="filter-group">
            <label>門店</label>
            <select id="tr-store" onchange="renderTrends()">
              <option value="all">全公司合計</option>
            </select>
          </div>
          <div class="filter-group">
            <label>顯示指標</label>
            <div style="display:flex;gap:10px;flex-wrap:wrap;padding-top:4px;">
              <label class="cb-label"><input type="checkbox" checked data-tr-metric="revenue" onchange="renderTrends()"> 營收</label>
              <label class="cb-label"><input type="checkbox" checked data-tr-metric="cost" onchange="renderTrends()"> 成本</label>
              <label class="cb-label"><input type="checkbox" checked data-tr-metric="gross_profit" onchange="renderTrends()"> 毛利</label>
              <label class="cb-label"><input type="checkbox" data-tr-metric="net_profit" onchange="renderTrends()"> 淨利</label>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">月度趨勢圖</span></div>
          <div class="chart-container h400"><canvas id="tr-chart"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">年度同期比較</span></div>
          <div class="chart-container h350"><canvas id="tr-yoy-chart"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">逐月數據表</span></div>
          <div class="table-wrapper" id="tr-table-wrap"></div>
        </div>
      </div>

      <!-- ===== PAGE: ACCOUNTS ===== -->
      <div class="page" id="page-accounts">
        <div class="filters">
          <div class="filter-group">
            <label>期間範圍</label>
            <select id="acc-period" onchange="renderAccounts()"></select>
          </div>
          <div class="filter-group">
            <label>門店</label>
            <select id="acc-store" onchange="renderAccounts()">
              <option value="all">全部門店</option>
            </select>
          </div>
        </div>
        <div class="grid-2">
          <div class="card">
            <div class="card-header"><span class="card-title">費用結構 (大類)</span></div>
            <div class="chart-container h350"><canvas id="acc-chart-pie"></canvas></div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">P&L 瀑布圖</span></div>
            <div class="chart-container h350"><canvas id="acc-chart-waterfall"></canvas></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title" id="acc-drill-title">科目明細 (點擊大類可展開)</span>
          </div>
          <div class="table-wrapper" id="acc-table-wrap"></div>
        </div>
      </div>

    </div><!-- /page-content -->
  </div><!-- /main-content -->
</div><!-- /app-container -->

<script>
/* ================================================================
   共好平台 P&L Dashboard v2
   ================================================================ */

const API_BASE = 'https://script.google.com/macros/s/AKfycbxmQYsYKJ6-7I_szysDiq122cJtMt-WoAiwpugR0ti4Hb1pjsTGrPQEmOKx5lS4scLH7g/exec';

// ========== API Fetch (JSONP script tag injection for CORS bypass) ==========
let _jsonpCounter = 0;
function jsonpFetch(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = '_jsonpCb_' + (++_jsonpCounter) + '_' + Date.now();
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('請求逾時，請稍後再試'));
    }, 30000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
    }

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    const url = new URL(API_BASE);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', cbName);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));

    const script = document.createElement('script');
    script.id = cbName;
    script.src = url.toString();
    script.onerror = function() {
      cleanup();
      reject(new Error('網路連線失敗，無法連接伺服器'));
    };
    document.head.appendChild(script);
  });
}

// ========== Data remapping ==========
function remapFactData(rawData) {
  return rawData.map(row => ({
    store_id: Number(row.year_month) || 0,
    year_month: Number(row.year_ad) || 0,
    account_code: String(row.quarter || ''),
    account_name: String(row.half_year || ''),
    category_l1: String(row.store_id || ''),
    category_l2: String(row.account_code || ''),
    amount: Number(row.account_name) || 0
  }));
}

// ========== ROC Calendar Helpers ==========
function rocToLabel(ym) {
  // ym like 11301 -> 113年1月, 11412 -> 114年12月
  const s = String(ym);
  if (s.length === 5) {
    const y = parseInt(s.substring(0, 3));
    const m = parseInt(s.substring(3));
    return y + '年' + m + '月';
  }
  return String(ym);
}

function rocToAD(ym) {
  const s = String(ym);
  if (s.length === 5) {
    const y = parseInt(s.substring(0, 3)) + 1911;
    const m = parseInt(s.substring(3));
    return y + '/' + String(m).padStart(2, '0');
  }
  return String(ym);
}

function rocYear(ym) {
  const s = String(ym);
  return s.length === 5 ? parseInt(s.substring(0, 3)) : 0;
}
function rocMonth(ym) {
  const s = String(ym);
  return s.length === 5 ? parseInt(s.substring(3)) : 0;
}

// ========== Number formatting ==========
function fmt(n) {
  if (n == null || isNaN(n)) return '-';
  return Math.round(n).toLocaleString('zh-TW');
}
function fmtPct(n) {
  if (n == null || isNaN(n) || !isFinite(n)) return '-';
  return n.toFixed(1) + '%';
}
function fmtNTD(n) {
  if (n == null || isNaN(n)) return '-';
  return 'NT$ ' + Math.round(n).toLocaleString('zh-TW');
}

// ========== P&L Calculation ==========
function calcPL(data) {
  let revenue = 0, directCost = 0, personnelCost = 0, venueCost = 0, opsCost = 0, adminCost = 0;
  let extraIncome = 0, extraExpense = 0;

  data.forEach(r => {
    const l1 = r.category_l1;
    const code = r.account_code;
    const amt = r.amount;
    if (l1 === '營業收入') revenue += amt;
    else if (l1 === '直接成本') directCost += amt;
    else if (l1 === '人事成本') personnelCost += amt;
    else if (l1 === '場地成本') venueCost += amt;
    else if (l1 === '營運費用') opsCost += amt;
    else if (l1 === '管理費用') adminCost += amt;
    else if (l1 === '營業外') {
      if (code === 'G001') extraIncome += amt;
      else if (code === 'G002') extraExpense += amt;
    }
  });

  const grossProfit = revenue - directCost;
  const opExpense = personnelCost + venueCost + opsCost + adminCost;
  const netProfit = grossProfit - opExpense + extraIncome - extraExpense;
  const grossMargin = revenue ? (grossProfit / revenue * 100) : 0;
  const netMargin = revenue ? (netProfit / revenue * 100) : 0;

  return {
    revenue, directCost, personnelCost, venueCost, opsCost, adminCost,
    extraIncome, extraExpense,
    totalCost: directCost + opExpense,
    grossProfit, grossMargin, opExpense, netProfit, netMargin
  };
}

// ========== Filter helpers ==========
function filterByPeriod(data, periodValue) {
  if (!periodValue || periodValue === 'all') return data;
  const [from, to] = periodValue.split('-').map(Number);
  return data.filter(r => r.year_month >= from && r.year_month <= to);
}

function filterByStore(data, storeId) {
  if (!storeId || storeId === 'all') return data;
  return data.filter(r => r.store_id === Number(storeId));
}

function populatePeriodSelect(sel, includeAll) {
  sel.innerHTML = '';
  if (includeAll) {
    const opt = document.createElement('option');
    opt.value = 'all';
    opt.textContent = '全部期間';
    sel.appendChild(opt);
  }

  // Group by ROC year
  const years = {};
  G.periods.forEach(p => {
    const y = rocYear(p);
    if (!years[y]) years[y] = [];
    years[y].push(p);
  });

  const sortedYears = Object.keys(years).map(Number).sort((a, b) => b - a);

  sortedYears.forEach(y => {
    const months = years[y].sort((a, b) => a - b);
    const from = months[0], to = months[months.length - 1];
    const opt = document.createElement('option');
    opt.value = from + '-' + to;
    opt.textContent = y + '年 全年 (' + rocToAD(from) + ' ~ ' + rocToAD(to) + ')';
    sel.appendChild(opt);

    // Also individual quarters if more than 3 months
    if (months.length > 3) {
      const quarters = [[],[],[],[]];
      months.forEach(m => {
        const mon = rocMonth(m);
        quarters[Math.floor((mon - 1) / 3)].push(m);
      });
      quarters.forEach((q, qi) => {
        if (q.length > 0) {
          const o2 = document.createElement('option');
          o2.value = q[0] + '-' + q[q.length - 1];
          o2.textContent = '  ' + y + '年 Q' + (qi + 1);
          sel.appendChild(o2);
        }
      });
    }

    // Individual months
    months.forEach(m => {
      const o3 = document.createElement('option');
      o3.value = m + '-' + m;
      o3.textContent = '  ' + rocToLabel(m);
      sel.appendChild(o3);
    });
  });
}

function populateStoreSelect(sel, includeAll, includeAllLabel) {
  sel.innerHTML = '';
  if (includeAll) {
    const opt = document.createElement('option');
    opt.value = 'all';
    opt.textContent = includeAllLabel || '全部門店';
    sel.appendChild(opt);
  }
  Object.keys(STORE_META).map(Number).sort((a, b) => a - b).forEach(id => {
    const st = STORE_META[id];
    if (st.status === 'closed') return;
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = st.name;
    sel.appendChild(opt);
  });
}

// ========== LOGIN ==========
async function doLogin() {
  const pw = document.getElementById('login-password').value.trim();
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!pw) { errEl.textContent = '請輸入密素'; return; }
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = '驗證中...';
  try {
    const res = await jsonpFetch('verify_password', { password: pw });
    if (res.ok) {
      G.token = res.token;
      sessionStorage.setItem('pl_token', res.token);
      showApp();
    } else {
      errEl.textContent = res.message || '密碼錯誤';
    }
  } catch (e) {
    errEl.textContent = e.message || '連線失敗，請稍後再試';
  }
  btn.disabled = false;
  btn.textContent = '登入';
}

// Enter key support
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  sessionStorage.removeItem('pl_token');
  G.token = null;
  document.getElementById('app-container').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('login-password').value = '';

}

// ========== APP INIT ==========
async function showApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app-container').style.display = 'block';
  showLoading('正在載入系統設定...');

  try {
    // Load config first
    const configRes = await jsonpFetch('get_config');
    G.config = configRes;
    if (configRes.last_updated) {
      document.getElementById('topbar-freshness').textContent = '資料更新: ' + configRes.last_updated;
      document.getElementById('sidebar-updated').textContent = '更新: ' + configRes.last_updated;
    }

    // Load stores and fact data in parallel
    showLoading('正在載入門店與損益資料...');
    const [storesRes, factRes] = await Promise.all([
      jsonpFetch('get_stores'),
      jsonpFetch('get_fact_data')
    ]);

    G.stores = storesRes.stores || [];
    G.factData = remapFactData(factRes.data || []);

    // Extract unique periods
    const periodSet = new Set();
    G.factData.forEach(r => { if (r.year_month) periodSet.add(r.year_month); });
    G.periods = Array.from(periodSet).sort((a, b) => a - b);

    // Load accounts
    showLoading('正在載入科目資料...');
    const accRes = await jsonpFetch('get_accounts');
    G.accounts = accRes.accounts || [];

    // Initialize all pages
    initFilters();
    renderOverview();

    hideLoading();
  } catch (e) {
    hideLoading();
    alert('載入資料失敗: ' + e.message);
  }
}

function navigateTo(page) {
  // Update nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector('.nav-item[data-page="' + page + '"]').classList.add('active');

  // Update pages
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');

  // Update title
  const titles = {
    'overview': '總覽',
    'comparison': '門店比較',
    'store-detail': '單店明細',
    'trends': '月度趨勢',
    'accounts': '科目分析'
  };
  document.getElementById('page-title').textContent = titles[page] || '';

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');

  // Render page
  if (page === 'overview') renderOverview();
  else if (page === 'comparison') renderComparison();
  else if (page === 'store-detail') renderStoreDetail();
  else if (page === 'trends') renderTrends();
  else if (page === 'accounts') renderAccounts();
}

  const profitByMonth = months.map(m => {

    .sort((a, b) => a - b);

  const metricLabels = {
    revenue: '營收', cost: '總成本', gross_profit: '毛利',
    gross_margin: '毛利率 (%)', net_profit: '淨利', net_margin: '淨利率 (%)'
  };

  document.getElementById('cmp-chart-title').textContent = '門店比較 — ' + metricLabels[metric];

  const storeResults = storeIds.map(id => {
    const sd = data.filter(r => r.store_id === id);
    const pl = calcPL(sd);
    let value;
    switch (metric) {
      case 'revenue': value = pl.revenue; break;
      case 'cost': value = pl.totalCost; break;
      case 'gross_profit': value = pl.grossProfit; break;
      case 'gross_margin': value = pl.grossMargin; break;
      case 'net_profit': value = pl.netProfit; break;
      case 'net_margin': value = pl.netMargin; break;
    }
    return { id, name: STORE_META[id].short, fullName: STORE_META[id].name, value, pl, status: STORE_META[id].status };
  }).sort((a, b) => b.value - a.value);

  // Chart
  destroyChart('cmp');
  const ctx = document.getElementById('cmp-chart').getContext('2d');
  const isPercent = metric.includes('margin');
  charts['cmp'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: storeResults.map(s => s.name),
      datasets: [{
        label: metricLabels[metric],
        data: storeResults.map(s => s.value),
        backgroundColor: storeResults.map((s, i) => {
          if (s.status === 'closed') return '#BDBDBD';
          if (i < 3) return '#4CAF50';
          if (i >= storeResults.length - 3) return '#E53935';
          return '#F5A623';
        }),
        borderRadius: 4,
        barPercentage: 0.65
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => isPercent ? fmtPct(ctx.parsed.x) : fmtNTD(ctx.parsed.x)
          }
        }
      },
      scales: {
        x: {
          ticks: { callback: v => isPercent ? v.toFixed(1) + '%' : fmt(v) },
          grid: { color: 'rgba(0,0,0,0.05)' }
        },
        y: { grid: { display: false } }
      }
    }
  });

  // Table
  let html = '<table><thead><tr>';
  html += '<th>#</th><th>門店</th><th>區域</th><th>主管</th>';
  html += '<th class="text-right">營收</th><th class="text-right">毛利</th><th class="text-right">毛利率</th>';
  html += '<th class="text-right">淨利</th><th class="text-right">淨利率</th><th>狀態</th>';
  html += '</tr></thead><tbody>';

  storeResults.forEach((s, i) => {
    const st = STORE_META[s.id];
    const rankClass = i < 3 ? 'rank-top' : (i >= storeResults.length - 3 ? 'rank-bottom' : '');
    const npClass = s.pl.netProfit >= 0 ? 'text-success' : 'text-danger';
    html += `<tr class="${rankClass}">
      <td>${i + 1}</td>
      <td class="fw-600">${st.name}</td>
      <td>${st.region}</td>
      <td>${st.manager}</td>
      <td class="text-right">${fmt(s.pl.revenue)}</td>
      <td class="text-right">${fmt(s.pl.grossProfit)}</td>
      <td class="text-right">${fmtPct(s.pl.grossMargin)}</td>
      <td class="text-right ${npClass} fw-600">${fmt(s.pl.netProfit)}</td>
      <td class="text-right ${npClass}">${fmtPct(s.pl.netMargin)}</td>
      <td>${st.status === 'closed' ? '<span class="badge badge-danger">已關閉</span>' : '<span class="badge badge-success">營運中</span>'}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('cmp-table-wrap').innerHTML = html;
}

// ========== PAGE: STORE DETAIL ==========
function renderStoreDetail() {
  const storeId = Number(document.getElementById('sd-store').value);
  const period = document.getElementById('sd-period').value;
  const storeData = filterByPeriod(filterByStore(G.factData, storeId), period);
  const allStoresData = filterByPeriod(G.factData.filter(r => STORE_META[r.store_id] && STORE_META[r.store_id].status !== 'closed'), period);

  const pl = calcPL(storeData);
  const avgPL = calcPL(allStoresData);
  const activeStoreCount = Object.keys(STORE_META).filter(id => STORE_META[id].status !== 'closed').length;

  // Normalize avg to per-store
  const avgRevenue = avgPL.revenue / activeStoreCount;
  const avgDirectCost = avgPL.directCost / activeStoreCount;
  const avgPersonnelCost = avgPL.personnelCost / activeStoreCount;
  const avgVenueCost = avgPL.venueCost / activeStoreCount;

  // Cost ratios
  const foodCostRate = pl.revenue ? (pl.directCost / pl.revenue * 100) : 0;
  const personnelRate = pl.revenue ? (pl.personnelCost / pl.revenue * 100) : 0;
  const venueRate = pl.revenue ? (pl.venueCost / pl.revenue * 100) : 0;
  const adminRate = pl.revenue ? ((pl.opsCost + pl.adminCost) / pl.revenue * 100) : 0;

  const avgFoodRate = avgPL.revenue ? (avgPL.directCost / avgPL.revenue * 100) : 0;
  const avgPersonnelRate = avgPL.revenue ? (avgPL.personnelCost / avgPL.revenue * 100) : 0;
  const avgVenueRate = avgPL.revenue ? (avgPL.venueCost / avgPL.revenue * 100) : 0;
  const avgAdminRate = avgPL.revenue ? ((avgPL.opsCost + avgPL.adminCost) / avgPL.revenue * 100) : 0;

  function diffBadge(val, avg, isLowerBetter) {
    const diff = val - avg;
    if (Math.abs(diff) < 0.5) return '<span class="badge badge-info">持平</span>';
    const good = isLowerBetter ? diff < 0 : diff > 0;
    return good
      ? `<span class="badge badge-success">${diff > 0 ? '+' : ''}${diff.toFixed(1)}%</span>`
      : `<span class="badge badge-danger">${diff > 0 ? '+' : ''}${diff.toFixed(1)}%</span>`;
  }

  const kpiHtml = `
    <div class="kpi-card">
      <div class="kpi-label">食材成本率</div>
      <div class="kpi-value">${fmtPct(foodCostRate)}</div>
      <div class="kpi-sub">公司平均 ${fmtPct(avgFoodRate)} ${diffBadge(foodCostRate, avgFoodRate, true)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">人事成本率</div>
      <div class="kpi-value">${fmtPct(personnelRate)}</div>
      <div class="kpi-sub">公司平均 ${fmtPct(avgPersonnelRate)} ${diffBadge(personnelRate, avgPersonnelRate, true)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">場地成本率</div>
      <div class="kpi-value">${fmtPct(venueRate)}</div>
      <div class="kpi-sub">公司平均 ${fmtPct(avgVenueRate)} ${diffBadge(venueRate, avgVenueRate, true)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">管理+營運費用率</div>
      <div class="kpi-value">${fmtPct(adminRate)}</div>
      <div class="kpi-sub">公司平均 ${fmtPct(avgAdminRate)} ${diffBadge(adminRate, avgAdminRate, true)}</div>
    </div>
    <div class="kpi-card ${pl.grossProfit >= 0 ? 'green' : 'red'}">
      <div class="kpi-label">毛利 / 毛利率</div>
      <div class="kpi-value">${fmtNTD(pl.grossProfit)}</div>
      <div class="kpi-sub">${fmtPct(pl.grossMargin)}</div>
    </div>
    <div class="kpi-card ${pl.netProfit >= 0 ? 'green' : 'red'}">
      <div class="kpi-label">淨利 / 淨利率</div>
      <div class="kpi-value">${fmtNTD(pl.netProfit)}</div>
      <div class="kpi-sub">${fmtPct(pl.netMargin)}</div>
    </div>
  `;
  document.getElementById('sd-kpi').innerHTML = kpiHtml;

  // Trend chart
  renderStoreDetailTrend(storeId, period);
  // Cost structure chart
  renderStoreDetailCost(pl);
  // P&L table
  renderStoreDetailPL(storeData);
}

function renderStoreDetailTrend(storeId, period) {
  destroyChart('sd-trend');
  const data = filterByPeriod(filterByStore(G.factData, storeId), period);
  const months = [...new Set(data.map(r => r.year_month))].sort((a, b) => a - b);

  const revenues = months.map(m => data.filter(r => r.year_month === m && r.category_l1 === '營業收入').reduce((s, r) => s + r.amount, 0));
  const profits = months.map(m => {
    const md = data.filter(r => r.year_month === m);
    return calcPL(md).netProfit;
  });

  const ctx = document.getElementById('sd-chart-trend').getContext('2d');
  charts['sd-trend'] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: months.map(rocToLabel),
      datasets: [
        { label: '營收', data: revenues, borderColor: '#F5A623', backgroundColor: 'rgba(245,166,35,0.1)', fill: true, tension: 0.3, pointRadius: 4 },
        { label: '淨利', data: profits, borderColor: '#4CAF50', backgroundColor: 'rgba(76,175,80,0.1)', fill: true, tension: 0.3, pointRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + fmtNTD(ctx.parsed.y) } }
      },
      scales: {
        y: { ticks: { callback: v => fmt(v) }, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { grid: { display: false } }
      }
    }
  });
}

function renderStoreDetailCost(pl) {
  destroyChart('sd-cost');
  const labels = ['直接成本', '人事成本', '場地成本', '營運費用', '管理費用'];
  const values = [pl.directCost, pl.personnelCost, pl.venueCost, pl.opsCost, pl.adminCost];
  const colors = labels.map(l => L1_COLORS[l] || '#999');

  const ctx = document.getElementById('sd-chart-cost').getContext('2d');
  charts['sd-cost'] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        tooltip: {
          callbacks: {
            label: ctx => {
              const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
              const pct = total ? (ctx.parsed / total * 100).toFixed(1) : 0;
              return ctx.label + ': ' + fmtNTD(ctx.parsed) + ' (' + pct + '%)';
            }
          }
        },
        legend: { position: 'right', labels: { boxWidth: 14, padding: 12 } }
      }

function renderStoreDetailPL(data) {
  // Group by L1, then by account
  const l1Groups = {};
  data.forEach(r => {
    const l1 = r.category_l1;
    if (!l1) return;
    if (!l1Groups[l1]) l1Groups[l1] = {};
    const key = r.account_code + '|' + r.account_name;
    if (!l1Groups[l1][key]) l1Groups[l1][key] = { code: r.account_code, name: r.account_name, l2: r.category_l2, amount: 0 };
    l1Groups[l1][key].amount += r.amount;
  });

  let html = '<table><thead><tr><th>科目代號</th><th>科目名稱</th><th>子類</th><th class="text-right">金額 (NT$)</th></tr></thead><tbody>';

  let grandRevenue = 0, grandCost = 0;

  L1_ORDER.forEach(l1 => {
    const group = l1Groups[l1];
    if (!group) return;
    const items = Object.values(group).sort((a, b) => a.code.localeCompare(b.code));
    const subtotal = items.reduce((s, i) => s + i.amount, 0);

    if (l1 === '營業收入') grandRevenue += subtotal;
    else grandCost += subtotal;

    html += `<tr class="l1-row"><td colspan="3">${l1}</td><td class="text-right">${fmt(subtotal)}</td></tr>`;
    items.forEach(item => {
      html += `<tr><td style="padding-left:24px;">${item.code}</td><td>${item.name}</td><td>${item.l2}</td><td class="text-right">${fmt(item.amount)}</td></tr>`;
    });
  });

  // Grand totals
  const pl = calcPL(data);
  html += `<tr class="total-row"><td colspan="3">毛利 (營業收入 - 直接成本)</td><td class="text-right">${fmt(pl.grossProfit)} (${fmtPct(pl.grossMargin)})</td></tr>`;
  html += `<tr class="total-row"><td colspan="3">營業淨利</td><td class="text-right">${fmt(pl.netProfit)} (${fmtPct(pl.netMargin)})</td></tr>`;

  html += '</tbody></table>';
  document.getElementById('sd-table-wrap').innerHTML = html;
}

// ========== PAGE: TRENDS ==========
function renderTrends() {
  const storeId = document.getElementById('tr-store').value;
  const data = storeId === 'all'
    ? G.factData.filter(r => STORE_META[r.store_id] && STORE_META[r.store_id].status !== 'closed')
    : filterByStore(G.factData, storeId);

  const checkedMetrics = [];
  document.querySelectorAll('[data-tr-metric]').forEach(cb => {
    if (cb.checked) checkedMetrics.push(cb.getAttribute('data-tr-metric'));
  });

  const months = [...new Set(data.map(r => r.year_month))].sort((a, b) => a - b);

  const metricConfig = {
    revenue: { label: '營收', color: '#F5A623', fn: pl => pl.revenue },
    cost: { label: '總成本', color: '#E53935', fn: pl => pl.totalCost },
    gross_profit: { label: '毛利', color: '#4CAF50', fn: pl => pl.grossProfit },
    net_profit: { label: '淨利', color: '#2196F3', fn: pl => pl.netProfit }
  };

  const datasets = checkedMetrics.map(key => {
    const mc = metricConfig[key];
    const values = months.map(m => {
      const md = data.filter(r => r.year_month === m);
      return mc.fn(calcPL(md));
    });
    return {
      label: mc.label,
      data: values,
      borderColor: mc.color,
      backgroundColor: mc.color + '18',
      fill: false,
      tension: 0.3,
      pointRadius: 4,
      pointHoverRadius: 6
    };
  });

  destroyChart('tr-main');
  const ctx = document.getElementById('tr-chart').getContext('2d');
  charts['tr-main'] = new Chart(ctx, {
    type: 'line',
    data: { labels: months.map(rocToLabel), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + fmtNTD(ctx.parsed.y) } },
        legend: { position: 'top' }
      },
      scales: {
        y: { ticks: { callback: v => fmt(v) }, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { grid: { display: false } }
      }
    }
  });

  // YoY chart
  renderTrendsYoY(data, months);
  // Table
  renderTrendsTable(data, months, checkedMetrics, metricConfig);
}

function renderTrendsYoY(data, allMonths) {
  destroyChart('tr-yoy');
  // Group months by ROC year
  const years = {};
  allMonths.forEach(m => {
    const y = rocYear(m);
    const mon = rocMonth(m);
    if (!years[y]) years[y] = {};
    years[y][mon] = data.filter(r => r.year_month === m && r.category_l1 === '營業收入').reduce((s, r) => s + r.amount, 0);
  });

  const sortedYears = Object.keys(years).map(Number).sort();
  if (sortedYears.length < 2) {
    // Not enough data for YoY
    const ctx = document.getElementById('tr-yoy-chart').getContext('2d');
    charts['tr-yoy'] = new Chart(ctx, {
      type: 'bar',
      data: { labels: ['尚無跨年度資料'], datasets: [] },
      options: { responsive: true, maintainAspectRatio: false }
    });
    return;
  }

  const monthLabels = Array.from({ length: 12 }, (_, i) => (i + 1) + '月');
  const datasets = sortedYears.map((y, idx) => ({
    label: y + '年 (民國)',
    data: Array.from({ length: 12 }, (_, i) => years[y][i + 1] || 0),
    backgroundColor: CHART_COLORS[idx % CHART_COLORS.length] + '99',
    borderColor: CHART_COLORS[idx % CHART_COLORS.length],
    borderWidth: 1,
    borderRadius: 3
  }));

  const ctx = document.getElementById('tr-yoy-chart').getContext('2d');
  charts['tr-yoy'] = new Chart(ctx, {
    type: 'bar',
    data: { labels: monthLabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + fmtNTD(ctx.parsed.y) } },
        legend: { position: 'top' }
      },
      scales: {
        y: { ticks: { callback: v => fmt(v) }, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { grid: { display: false } }
      }
    }
  });
}

function renderTrendsTable(data, months, checkedMetrics, metricConfig) {
  let html = '<table><thead><tr><th>月份</th>';
  checkedMetrics.forEach(k => { html += `<th class="text-right">${metricConfig[k].label}</th>`; });
  html += '<th class="text-right">毛利率</th><th class="text-right">淨利率</th></tr></thead><tbody>';

  months.forEach(m => {
    const md = data.filter(r => r.year_month === m);
    const pl = calcPL(md);
    html += `<tr><td class="fw-600">${rocToLabel(m)}</td>`;
    checkedMetrics.forEach(k => {
      const v = metricConfig[k].fn(pl);
      const cls = k === 'net_profit' ? (v >= 0 ? 'text-success' : 'text-danger') : '';
      html += `<td class="text-right ${cls}">${fmt(v)}</td>`;
    });
    html += `<td class="text-right">${fmtPct(pl.grossMargin)}</td>`;
    html += `<td class="text-right ${pl.netMargin >= 0 ? 'text-success' : 'text-danger'}">${fmtPct(pl.netMargin)}</td>`;
    html += '</tr>';
  });

  // Totals
  const totalPL = calcPL(data);
  html += '<tr class="total-row"><td class="fw-600">合計/平均</td>';
  checkedMetrics.forEach(k => {
    html += `<td class="text-right fw-600">${fmt(metricConfig[k].fn(totalPL))}</td>`;
  });
  html += `<td class="text-right fw-600">${fmtPct(totalPL.grossMargin)}</td>`;
  html += `<td class="text-right fw-600">${fmtPct(totalPL.netMargin)}</td>`;
  html += '</tr></tbody></table>';
  document.getElementById('tr-table-wrap').innerHTML = html;
}

// ========== PAGE: ACCOUNTS ==========
let accDrillL1 = null; // Currently drilled-down L1 category

function renderAccounts() {
  const period = document.getElementById('acc-period').value;
  const storeId = document.getElementById('acc-store').value;
  let data = filterByPeriod(G.factData, period);
  if (storeId !== 'all') {
    data = filterByStore(data, storeId);
  } else {
    data = data.filter(r => STORE_META[r.store_id] && STORE_META[r.store_id].status !== 'closed');
  }

  renderAccountsPie(data);
  renderAccountsWaterfall(data);
  renderAccountsTable(data);
}

function renderAccountsPie(data) {
  destroyChart('acc-pie');
  // Expense categories only (exclude revenue)
  const expenseL1 = ['直接成本', '人事成本', '場地成本', '營運費用', '管理費用'];
  const values = expenseL1.map(l1 => data.filter(r => r.category_l1 === l1).reduce((s, r) => s + r.amount, 0));
  const colors = expenseL1.map(l => L1_COLORS[l]);

  const ctx = document.getElementById('acc-chart-pie').getContext('2d');
  charts['acc-pie'] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: expenseL1,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: (e, elements) => {
        if (elements.length > 0) {
          const idx = elements[0].index;
          accDrillL1 = expenseL1[idx];
          renderAccountsTable(getCurrentAccountData());
          document.getElementById('acc-drill-title').textContent = '科目明細 — ' + accDrillL1 + ' (點擊標題返回)';
        }
      },
      plugins: {
        tooltip: {
          callbacks: {
            label: ctx => {
              const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
              const pct = total ? (ctx.parsed / total * 100).toFixed(1) : 0;
              return ctx.label + ': ' + fmtNTD(ctx.parsed) + ' (' + pct + '%)';
            }
          }
        },
        legend: { position: 'right', labels: { boxWidth: 14, padding: 12 } }
      }
    }
  });
}

function renderAccountsWaterfall(data) {
  destroyChart('acc-waterfall');
  const pl = calcPL(data);

  const labels = ['營業收入', '直接成本', '毛利', '人事成本', '場地成本', '營運費用', '管理費用', '營業外淨額', '營業淨利'];
  const extraNet = pl.extraIncome - pl.extraExpense;
  const values = [pl.revenue, -pl.directCost, pl.grossProfit, -pl.personnelCost, -pl.venueCost, -pl.opsCost, -pl.adminCost, extraNet, pl.netProfit];

  const bgColors = values.map((v, i) => {
    if (i === 0) return '#4CAF50';
    if (i === 2) return '#FFC107';
    if (i === labels.length - 1) return v >= 0 ? '#4CAF50' : '#E53935';
    return v >= 0 ? '#66BB6A' : '#EF5350';
  });

  const ctx = document.getElementById('acc-chart-waterfall').getContext('2d');
  charts['acc-waterfall'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '金額',
        data: values,
        backgroundColor: bgColors,
        borderRadius: 3,
        barPercentage: 0.6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => fmtNTD(ctx.parsed.y) }
        }
      },
      scales: {
        y: { ticks: { callback: v => fmt(v) }, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { grid: { display: false } }
      }
    }
  });
}

function getCurrentAccountData() {
  const period = document.getElementById('acc-period').value;
  const storeId = document.getElementById('acc-store').value;
  let data = filterByPeriod(G.factData, period);
  if (storeId !== 'all') {
    data = filterByStore(data, storeId);
  } else {
    data = data.filter(r => STORE_META[r.store_id] && STORE_META[r.store_id].status !== 'closed');
  }
  return data;
}

function renderAccountsTable(data) {
  const titleEl = document.getElementById('acc-drill-title');

  if (accDrillL1) {
    // Show L2 breakdown for selected L1
    titleEl.textContent = '科目明細 — ' + accDrillL1 + ' (點擊返回總覽)';
    titleEl.style.cursor = 'pointer';
    titleEl.onclick = () => {
      accDrillL1 = null;
      renderAccountsTable(getCurrentAccountData());
    };

    const filtered = data.filter(r => r.category_l1 === accDrillL1);
    const accounts = {};
    filtered.forEach(r => {
      const key = r.account_code;
      if (!accounts[key]) accounts[key] = { code: r.account_code, name: r.account_name, l2: r.category_l2, amount: 0 };
      accounts[key].amount += r.amount;
    });

    const sorted = Object.values(accounts).sort((a, b) => b.amount - a.amount);
    const total = sorted.reduce((s, a) => s + a.amount, 0);

    let html = '<table><thead><tr><th>科目代號</th><th>科目名稱</th><th>子類 (L2)</th><th class="text-right">金額</th><th class="text-right">占比</th></tr></thead><tbody>';
    sorted.forEach(a => {
      const pct = total ? (a.amount / total * 100) : 0;
      html += `<tr><td>${a.code}</td><td>${a.name}</td><td>${a.l2}</td><td class="text-right">${fmt(a.amount)}</td><td class="text-right">${fmtPct(pct)}</td></tr>`;
    });
    html += `<tr class="total-row"><td colspan="3">小計</td><td class="text-right">${fmt(total)}</td><td class="text-right">100%</td></tr>`;
    html += '</tbody></table>';
    document.getElementById('acc-table-wrap').innerHTML = html;
    return;
  }

  // Show L1 summary
  titleEl.textContent = '科目明細 (點擊大類可展開)';
  titleEl.style.cursor = 'default';
  titleEl.onclick = null;

  const l1Totals = {};
  data.forEach(r => {
    if (!r.category_l1) return;
    if (!l1Totals[r.category_l1]) l1Totals[r.category_l1] = 0;
    l1Totals[r.category_l1] += r.amount;
  });

  const pl = calcPL(data);

  let html = '<table><thead><tr><th>大類 (L1)</th><th class="text-right">金額</th><th class="text-right">占營收比</th><th></th></tr></thead><tbody>';

  L1_ORDER.forEach(l1 => {
    const amt = l1Totals[l1] || 0;
    const pct = pl.revenue ? (amt / pl.revenue * 100) : 0;
    html += `<tr class="clickable-row" onclick="drillToL1('${l1}')">
      <td class="fw-600" style="color:${L1_COLORS[l1] || '#333'};">${l1}</td>
      <td class="text-right fw-600">${fmt(amt)}</td>
      <td class="text-right">${fmtPct(pct)}</td>
      <td style="color:var(--text-muted);font-size:0.8rem;">展開 &rarr;</td>
    </tr>`;
  });

  html += `<tr class="subtotal-row"><td>毛利</td><td class="text-right">${fmt(pl.grossProfit)}</td><td class="text-right">${fmtPct(pl.grossMargin)}</td><td></td></tr>`;
  html += `<tr class="total-row"><td>營業淨利</td><td class="text-right">${fmt(pl.netProfit)}</td><td class="text-right">${fmtPct(pl.netMargin)}</td><td></td></tr>`;
  html += '</tbody></table>';
  document.getElementById('acc-table-wrap').innerHTML = html;
}

function drillToL1(l1) {
  accDrillL1 = l1;
  renderAccountsTable(getCurrentAccountData());
}

// ========== SESSION CHECK & INIT ==========
(function init() {
  const token = sessionStorage.getItem('pl_token');
  if (token) {
    G.token = token;
    showApp();
  } else {
    document.getElementById('login-page').style.display = 'flex';
  }
})();
</script>
