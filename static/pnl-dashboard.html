<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系統已升級 - 請使用新版儀表板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: linear-gradient(135deg, #FFF8E7 0%, #FFF3E0 50%, #FFE0B2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #333;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    padding: 48px 40px;
    max-width: 520px;
    width: 100%;
    text-align: center;
  }
  .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 1.6rem;
    color: #D4841C;
    margin-bottom: 12px;
    font-weight: 700;
  }
  .subtitle {
    color: #666;
    font-size: 1rem;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .info-box {
    background: #FFF8E1;
    border-left: 4px solid #F5A623;
    padding: 16px 20px;
    border-radius: 6px;
    text-align: left;
    margin: 24px 0;
    font-size: 0.92rem;
    line-height: 1.7;
    color: #555;
  }
  .info-box strong {
    color: #D4841C;
  }
  .btn {
    display: inline-block;
    background: linear-gradient(135deg, #F5A623, #D4841C);
    color: #fff;
    padding: 14px 36px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 12px rgba(245,166,35,0.3);
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(245,166,35,0.4);
  }
  .footer {
    margin-top: 28px;
    font-size: 0.8rem;
    color: #999;
  }
  .countdown {
    font-size: 0.85rem;
    color: #888;
    margin-top: 16px;
  }
  .countdown span {
    color: #D4841C;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🧁</div>
    <h1>系統已升級</h1>
    <p class="subtitle">
      P&L 分析系統 v2.0 已停用<br>
      請使用最新版儀表板
    </p>
    <div class="info-box">
      <strong>📌 為什麼要更換?</strong><br>
      此版本資料處理邏輯經查證有誤,顯示數字不可信。<br>
      新版「烘焙DIY損益分析系統 v2.3」經對帳驗證,數字正確,功能更完整。
    </div>
    <a href="/static/dashboard.html" class="btn">前往新版儀表板 →</a>
    <p class="countdown">將於 <span id="cd">10</span> 秒後自動跳轉</p>
    <div class="footer">
      共好平台有限公司 · 烘焙DIY聚樂部
    </div>
  </div>
  <script>
    let s = 10;
    const cdEl = document.getElementById('cd');
    const timer = setInterval(() => {
      s--;
      cdEl.textContent = s;
      if (s <= 0) {
        clearInterval(timer);
        window.location.href = '/static/dashboard.html';
      }
    }, 1000);
  </script>
</body>
</html>
