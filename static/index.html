<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>員工口語應對訓練站</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Service Training Studio</p>
        <h1>員工口語訓練</h1>
        <p class="subtitle">登入後直接說話練習。</p>
      </section>

      <section class="panel login-panel" id="login-panel">
        <h2>登入使用</h2>
        <form id="login-form" class="stack">
          <label for="role">登入身分</label>
          <select id="role" name="role">
            <option value="employee">員工練習</option>
            <option value="admin">後台管理員</option>
          </select>
          <div id="employee-login-fields">
            <label for="employee-id">員工編號</label>
            <input id="employee-id" name="employee_id" type="text" placeholder="例如 E001" autocomplete="username" autocapitalize="characters" autocorrect="off" spellcheck="false">
          </div>
          <label for="password">訓練密碼</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="請輸入密碼" autocapitalize="off" autocorrect="off" spellcheck="false">
          <button type="submit">登入</button>
        </form>
        <p class="hint">員工使用自己的員工編號與密碼登入。</p>
      </section>

      <section class="panel app-panel hidden" id="app-panel">
        <section class="session-banner" aria-label="登入狀態">
          <div>
            <h2 id="session-title">準備開始今天的口語訓練</h2>
            <p id="session-subtitle" class="session-subtitle">選擇單元後開始練習。</p>
          </div>
        </section>

        <div class="mode-switch" role="tablist" aria-label="模式切換">
          <button id="practice-tab" type="button" class="mode-button active">練習模式</button>
          <button id="admin-tab" type="button" class="mode-button">後台管理</button>
        </div>

        <section id="practice-view">
        <div class="toolbar">
          <div class="toolbar-copy">
            <h2>開始練習</h2>
            <p id="active-section">請先選擇單元。</p>
          </div>
          <div class="selector-wrap">
            <select id="section-select"></select>
            <button id="start-button" type="button">開始本單元</button>
          </div>
        </div>

        <section class="voice-panel" aria-label="語音控制">
          <div class="voice-copy">
            <h3>直接對教練說話</h3>
            <p id="voice-status">按下開始說話，說完後再按一次送出。</p>
          </div>
          <div class="voice-actions">
            <button id="voice-button" type="button" class="voice-primary-button">開始說話</button>
            <button id="speak-button" type="button" class="secondary-button voice-secondary-button">返回登入頁</button>
          </div>
        </section>

        <div id="practice-exit-wrap" class="feedback-row hidden">
          <p class="status-text">本輪練習已完成後，可直接回到登入頁。</p>
          <button id="practice-logout-button" type="button" class="secondary-button">回到登入頁</button>
        </div>

        <div id="chat" class="chat"></div>
        <textarea id="message-input" class="hidden-input" aria-hidden="true" tabindex="-1"></textarea>
        </section>

        <section id="admin-view" class="admin-view hidden">
          <div class="admin-header">
            <div>
              <h2>題庫與規則後台</h2>
              <p>在這裡修改教練回覆規則、結束口令、公開答案時機，以及每個單元的題目內容。</p>
            </div>
            <button id="save-admin-button" type="button">儲存全部設定</button>
          </div>
          <div class="feedback-row">
            <p id="admin-feedback" class="status-text"></p>
            <button id="admin-logout-button" type="button" class="secondary-button hidden">回到登入頁</button>
          </div>

          <div class="admin-nav" aria-label="後台功能切換">
            <button type="button" class="admin-nav-button active" data-admin-nav="accounts">帳號設定</button>
            <button type="button" class="admin-nav-button" data-admin-nav="rules">回答規則</button>
            <button type="button" class="admin-nav-button" data-admin-nav="questions">題庫管理</button>
            <button type="button" class="admin-nav-button" data-admin-nav="reports">成績報表</button>
          </div>

          <section class="panel admin-card" data-admin-panel="accounts">
            <div class="admin-sections-header">
              <h3>登入密碼管理</h3>
              <button id="save-auth-button" type="button">只儲存帳號設定</button>
            </div>
            <div class="rules-grid" id="auth-form"></div>
            <div class="admin-sections-header">
              <h3>員工帳號管理</h3>
              <button id="add-employee-button" type="button" class="secondary-button">新增員工</button>
            </div>
            <p class="status-text">新增或修改員工後，可按上方「儲存全部設定」或「只儲存帳號設定」。</p>
            <div id="employees-form" class="admin-sections"></div>
          </section>

          <section class="panel admin-card hidden" data-admin-panel="rules">
            <h3>回答規則</h3>
            <div class="rules-grid" id="rules-form"></div>
          </section>

          <section class="panel admin-card hidden" data-admin-panel="questions">
            <div class="admin-sections-header">
              <h3>題庫管理</h3>
              <div class="admin-action-row">
                <input id="excel-import-input" type="file" accept=".xlsx" class="hidden">
                <button id="export-excel-button" type="button" class="secondary-button">匯出 Excel</button>
                <button id="import-excel-button" type="button" class="secondary-button">匯入 Excel</button>
                <button id="add-section-button" type="button" class="secondary-button">新增單元</button>
              </div>
            </div>
            <div id="admin-sections" class="admin-sections"></div>
          </section>

          <section class="panel admin-card hidden" data-admin-panel="reports">
            <div class="admin-sections-header">
              <h3>員工練習紀錄</h3>
              <div class="admin-action-row">
                <button id="filter-reports-button" type="button" class="secondary-button">套用篩選</button>
                <button id="export-reports-button" type="button" class="secondary-button">匯出成績報表</button>
              </div>
            </div>
            <div id="reports-filters" class="rules-grid"></div>
            <div id="reports-summary" class="status-text">尚未載入報表。</div>
            <div id="reports-list" class="admin-sections"></div>
          </section>
        </section>
      </section>
    </main>

    <template id="bubble-template">
      <article class="bubble">
        <p></p>
      </article>
    </template>

    <script src="/static/app.js" defer></script>
  </body>
  </html>
