<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自己做烘焙聚樂部 — POS 銷售動態儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>
<style>
/* ===== CSS Reset & Variables ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0f1117;--bg-secondary:#1a1d29;--bg-card:#222639;--bg-hover:#2a2e42;
  --text-primary:#e8eaf0;--text-secondary:#9ca3af;--text-muted:#6b7280;
  --accent:#6366f1;--accent-light:#818cf8;--accent-dark:#4f46e5;
  --success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--info:#06b6d4;
  --border:#2d3148;--shadow:0 4px 24px rgba(0,0,0,0.4);
  --region-n1:#6366f1;--region-n2:#8b5cf6;--region-n3:#06b6d4;--region-cs:#f59e0b;
  --radius:12px;--transition:all .2s ease;
}
html{font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
a{color:var(--accent-light);text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg-secondary)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ===== Layout ===== */
.app-header{background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);padding:20px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-inner{max-width:1600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.brand{display:flex;align-items:center;gap:12px}
.brand h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#c7d2fe,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand .subtitle{font-size:.8rem;color:var(--text-secondary)}
.header-badge{background:var(--accent);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:99px;font-weight:600}

.main-content{max-width:1600px;margin:0 auto;padding:16px}
.filters-bar{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:140px}
.filter-group label{font-size:.75rem;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.filter-group select,.filter-group input{background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);padding:8px 12px;border-radius:8px;font-size:.85rem;outline:none;transition:var(--transition)}
.filter-group select:focus,.filter-group input:focus{border-color:var(--accent)}
.filter-group select[multiple]{height:auto;min-height:36px}
.quick-btns{display:flex;gap:4px;flex-wrap:wrap}
.quick-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);padding:6px 10px;border-radius:6px;font-size:.75rem;cursor:pointer;transition:var(--transition);white-space:nowrap}
.quick-btn:hover,.quick-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;transition:var(--transition);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.kpi-card:nth-child(1)::before{background:var(--accent)}
.kpi-card:nth-child(2)::before{background:var(--success)}
.kpi-card:nth-child(3)::before{background:var(--warning)}
.kpi-card:nth-child(4)::before{background:var(--info)}
.kpi-card:nth-child(5)::before{background:var(--danger)}
.kpi-card:nth-child(6)::before{background:#d946ef}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.kpi-label{font-size:.75rem;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:1.6rem;font-weight:800;letter-spacing:-.5px}
.kpi-sub{font-size:.75rem;color:var(--text-muted);margin-top:2px}

/* Tabs */
.tabs-nav{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;border-bottom:1px solid var(--border)}
.tab-btn{background:transparent;border:none;color:var(--text-secondary);padding:10px 18px;font-size:.85rem;font-weight:600;cursor:pointer;transition:var(--transition);border-bottom:2px solid transparent;white-space:nowrap}
.tab-btn:hover{color:var(--text-primary)}
.tab-btn.active{color:var(--accent-light);border-bottom-color:var(--accent)}

/* Chart containers */
.charts-grid{display:grid;gap:16px}
.charts-grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(min(100%,500px),1fr))}
.charts-grid.cols-3{grid-template-columns:repeat(auto-fit,minmax(min(100%,400px),1fr))}
.chart-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;min-height:320px;display:flex;flex-direction:column}
.chart-card.full-width{grid-column:1/-1}
.chart-title{font-size:.9rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.chart-subtitle{font-size:.72rem;color:var(--text-muted);margin-bottom:12px}
.chart-body{flex:1;min-height:0}
.chart-toggle{display:flex;gap:4px}
.chart-toggle button{background:var(--bg-primary);border:1px solid var(--border);color:var(--text-secondary);padding:3px 10px;border-radius:4px;font-size:.7rem;cursor:pointer;transition:var(--transition)}
.chart-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Table */
.data-table-wrap{overflow:auto;max-height:500px}
.data-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.8rem}
.data-table th{position:sticky;top:0;background:var(--bg-secondary);color:var(--text-secondary);font-weight:600;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
.data-table th:hover{color:var(--text-primary)}
.data-table td{padding:6px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.data-table tr:hover td{background:var(--bg-hover)}
.search-input{background:var(--bg-primary);border:1px solid var(--border);color:var(--text-primary);padding:8px 12px;border-radius:8px;font-size:.85rem;width:100%;max-width:300px;margin-bottom:8px;outline:none}
.search-input:focus{border-color:var(--accent)}

/* Heatmap */
.heatmap-grid{display:grid;gap:2px;font-size:.65rem}
.heatmap-cell{border-radius:3px;display:flex;align-items:center;justify-content:center;padding:4px 2px;color:var(--text-secondary);min-height:28px;cursor:default;transition:var(--transition)}
.heatmap-cell:hover{outline:2px solid var(--accent);z-index:1}
.heatmap-label{font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Calendar heatmap */
.cal-grid{display:flex;gap:2px;flex-wrap:wrap}
.cal-cell{width:14px;height:14px;border-radius:2px;cursor:default;transition:var(--transition)}
.cal-cell:hover{outline:1px solid var(--accent-light)}
.cal-month-label{font-size:.65rem;color:var(--text-muted);margin:4px 0 2px}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:var(--bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:16px;color:var(--text-secondary);font-size:.9rem}
.loading-sub{color:var(--text-muted);font-size:.75rem;margin-top:4px}

/* Footer */
.app-footer{text-align:center;padding:16px;color:var(--text-muted);font-size:.75rem;border-top:1px solid var(--border);margin-top:24px}

/* Responsive */
@media(max-width:768px){
  html{font-size:12px}
  .header-inner{flex-direction:column;align-items:flex-start}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .filters-bar{flex-direction:column}
  .filter-group{width:100%}
  .charts-grid.cols-2,.charts-grid.cols-3{grid-template-columns:1fr}
}

/* Tooltip override */
.recharts-tooltip-wrapper{z-index:10!important}
.custom-tooltip{background:var(--bg-secondary)!important;border:1px solid var(--border)!important;border-radius:8px!important;padding:10px 14px!important;box-shadow:var(--shadow)!important}
.custom-tooltip .label{font-weight:700;margin-bottom:4px;color:var(--text-primary)}
.custom-tooltip .item{font-size:.8rem;color:var(--text-secondary);display:flex;align-items:center;gap:6px;margin:2px 0}
.custom-tooltip .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* ================================================================
   自己做烘焙聚樂部 — POS 銷售動態儀表板
   ================================================================ */
const { useState, useEffect, useMemo, useCallback, useRef } = React;
const {
  ResponsiveContainer, LineChart, Line, BarChart, Bar, AreaChart, Area,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend, PieChart, Pie, Cell,
  ScatterChart, Scatter, ZAxis, ComposedChart, ReferenceLine
} = Recharts;

/* ---------- CONFIG ---------- */
// ★ 貼上你的 Apps Script Web App URL ★
const API_URL = 'https://script.google.com/macros/s/AKfycbzexNeicaQJPsmWM6lhVA8hQeLaXJIbw5NfHOnOdy95zkyCLA5CpuGyH8lVMf6KJZ_vOQ/exec';

const REGION_COLORS = {
  '北一區':'#6366f1','北二區':'#8b5cf6','北三區':'#06b6d4','中南區':'#f59e0b','未分區':'#6b7280'
};
const CATEGORY_COLORS = [
  '#6366f1','#8b5cf6','#06b6d4','#22c55e','#f59e0b','#ef4444','#ec4899','#d946ef',
  '#14b8a6','#f97316','#84cc16','#0ea5e9','#a78bfa','#fb923c','#34d399','#fbbf24'
];
const STORE_COLORS = [
  '#6366f1','#8b5cf6','#06b6d4','#22c55e','#f59e0b','#ef4444','#ec4899','#d946ef',
  '#14b8a6','#f97316','#84cc16','#0ea5e9'
];

/* ---------- HELPERS ---------- */
const fmt = {
  currency: v => 'NT$ ' + (v||0).toLocaleString('zh-TW'),
  number: v => (v||0).toLocaleString('zh-TW'),
  pct: v => (v||0).toFixed(1) + '%',
  pct2: v => (v||0).toFixed(2) + '%',
  short: v => {
    if(v>=1e8) return (v/1e8).toFixed(1)+'億';
    if(v>=1e4) return (v/1e4).toFixed(0)+'萬';
    return v.toLocaleString('zh-TW');
  }
};

function getYearMonth(d){ return d ? d.substring(0,7) : '' }
function parseYM(ym){ const [y,m]=ym.split('-'); return new Date(+y,+m-1) }

function getCurrentYM(){
  const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);
}
function getLastMonthYM(){
  const d=new Date(); d.setMonth(d.getMonth()-1);
  return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);
}
function getQuarterRange(offset=0){
  const d=new Date(); const q=Math.floor(d.getMonth()/3)+offset;
  const y=d.getFullYear()+Math.floor(q/4); const qn=((q%4)+4)%4;
  const s=y+'-'+(qn*3+1<10?'0':'')+(qn*3+1);
  const e=y+'-'+(qn*3+3<10?'0':'')+(qn*3+3);
  return [s,e];
}

/* ---------- CUSTOM TOOLTIP ---------- */
function CustomTooltip({active,payload,label,formatter}){
  if(!active||!payload?.length) return null;
  return (
    <div className="custom-tooltip">
      <div className="label">{label}</div>
      {payload.map((p,i)=>(
        <div key={i} className="item">
          <span className="dot" style={{background:p.color||p.fill}}/>
          {p.name}: {formatter?formatter(p.value):fmt.number(p.value)}
        </div>
      ))}
    </div>
  );
}

/* ================================================================
   MAIN APP
   ================================================================ */
function App(){
  const [rawData, setRawData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [activeTab, setActiveTab] = useState(0);

  // Filters
  const [dateStart, setDateStart] = useState('');
  const [dateEnd, setDateEnd] = useState('');
  const [selRegion, setSelRegion] = useState('全部');
  const [selStores, setSelStores] = useState([]);
  const [quickDate, setQuickDate] = useState('');

  /* ---------- FETCH DATA (JSONP to avoid GAS CORS redirect issue) ---------- */
  useEffect(()=>{
    setLoading(true);
    const cbName = '_gasCb_' + Date.now();
    const timeout = setTimeout(()=>{
      delete window[cbName];
      setError('API 逾時，請重新整理頁面');
      setLoading(false);
    }, 120000);
    window[cbName] = (d)=>{
      clearTimeout(timeout);
      delete window[cbName];
      try{
        setRawData(d);
        const yms = [...new Set(d.monthly.map(m=>m.yearMonth))].sort();
        if(yms.length){
          const cy = new Date().getFullYear().toString();
          const yearMonths = yms.filter(y=>y.startsWith(cy));
          setDateStart(yearMonths.length?yearMonths[0]:yms[0]);
          setDateEnd(yearMonths.length?yearMonths[yearMonths.length-1]:yms[yms.length-1]);
          setQuickDate('ytd');
        }
        setLoading(false);
      }catch(e){setError(e.message);setLoading(false);}
    };
    const script = document.createElement('script');
    script.src = API_URL + (API_URL.includes('?')?'&':'?') + 'callback=' + cbName;
    script.onerror = ()=>{
      clearTimeout(timeout);
      delete window[cbName];
      setError('API 載入失敗，請檢查網路連線');
      setLoading(false);
    };
    document.body.appendChild(script);
  },[]);

  /* ---------- QUICK DATE PRESETS ---------- */
  const applyQuickDate = useCallback((preset)=>{
    if(!rawData) return;
    setQuickDate(preset);
    const yms=[...new Set(rawData.monthly.map(m=>m.yearMonth))].sort();
    if(!yms.length) return;
    const minYM=yms[0], maxYM=yms[yms.length-1];
    const clamp=(v)=> v<minYM?minYM : v>maxYM?maxYM : v;
    const now = new Date();
    const cy = now.getFullYear();
    const cm = now.getMonth()+1;
    const cmStr = cy+'-'+(cm<10?'0':'')+cm;
    let s,e;
    switch(preset){
      case 'thisMonth': s=cmStr; e=cmStr; break;
      case 'lastMonth': {const lm=getLastMonthYM(); s=lm; e=lm;} break;
      case 'thisQ': {[s,e]=getQuarterRange(0);} break;
      case 'lastQ': {[s,e]=getQuarterRange(-1);} break;
      case 'ytd': s=cy+'-01'; e=cmStr; break;
      case 'lastYear': s=(cy-1)+'-01'; e=(cy-1)+'-12'; break;
      case 'all': s=minYM; e=maxYM; break;
      default: return;
    }
    setDateStart(clamp(s)); setDateEnd(clamp(e));
  },[rawData]);

  /* ---------- AVAILABLE MONTHS ---------- */
  const allMonths = useMemo(()=>{
    if(!rawData) return [];
    return [...new Set(rawData.monthly.map(m=>m.yearMonth))].sort();
  },[rawData]);

  /* ---------- STORE LIST (filtered by region) ---------- */
  const availableStores = useMemo(()=>{
    if(!rawData) return [];
    let stores = rawData.filters.stores;
    if(selRegion!=='全部') stores = stores.filter(s=>s.region===selRegion);
    return stores;
  },[rawData, selRegion]);

  /* ---------- FILTERED MONTHLY DATA ---------- */
  const filtered = useMemo(()=>{
    if(!rawData) return [];
    return rawData.monthly.filter(m=>{
      if(dateStart && m.yearMonth < dateStart) return false;
      if(dateEnd && m.yearMonth > dateEnd) return false;
      if(selRegion!=='全部' && m.region!==selRegion) return false;
      if(selStores.length>0 && !selStores.includes(m.store)) return false;
      return true;
    });
  },[rawData, dateStart, dateEnd, selRegion, selStores]);

  /* ---------- FILTERED DAILY DATA ---------- */
  const filteredDaily = useMemo(()=>{
    if(!rawData) return [];
    const startD = dateStart ? dateStart+'-01' : '';
    const endD = dateEnd ? dateEnd+'-31' : '';
    return rawData.daily.filter(d=>{
      if(startD && d.date < startD) return false;
      if(endD && d.date > endD) return false;
      return true;
    });
  },[rawData, dateStart, dateEnd]);

  /* ---------- COMPUTED KPIs ---------- */
  const kpis = useMemo(()=>{
    let totalRev=0, desserts=0, companions=0, limitedRev=0, txns=0;
    filtered.forEach(m=>{
      totalRev+=m.revenue;
      desserts+=m.dessertCount;
      companions+=m.companionCount;
      txns+=m.txnCount;
      if(m.mainCategory==='限定甜點') limitedRev+=m.revenue;
    });
    const hc = desserts + companions;
    return {
      totalRevenue: totalRev,
      headcount: hc,
      dessertCount: desserts,
      companionCount: companions,
      avgSpendPerHead: hc>0 ? Math.round(totalRev/hc) : 0,
      companionRate: hc>0 ? (companions/hc*100) : 0,
      limitedRevenue: limitedRev,
      limitedRevenueRatio: totalRev>0 ? (limitedRev/totalRev*100) : 0
    };
  },[filtered]);

  /* ---------- AGGREGATIONS FOR CHARTS ---------- */

  // Monthly totals
  const monthlyTotals = useMemo(()=>{
    const map={};
    filtered.forEach(m=>{
      if(!map[m.yearMonth]) map[m.yearMonth]={ym:m.yearMonth,revenue:0,headcount:0,dessertCount:0,companionCount:0};
      const t=map[m.yearMonth];
      t.revenue+=m.revenue; t.headcount+=m.headcount; t.dessertCount+=m.dessertCount; t.companionCount+=m.companionCount;
    });
    return Object.values(map).sort((a,b)=>a.ym<b.ym?-1:1).map(t=>({
      ...t, avgSpend: t.headcount>0?Math.round(t.revenue/t.headcount):0,
      companionRate: t.headcount>0?(t.companionCount/t.headcount*100):0
    }));
  },[filtered]);

  // Monthly by store
  const monthlyByStore = useMemo(()=>{
    const map={};
    filtered.forEach(m=>{
      const k=m.yearMonth+'|'+m.store;
      if(!map[k]) map[k]={ym:m.yearMonth,store:m.store,region:m.region,revenue:0,headcount:0,dessertCount:0,companionCount:0};
      const t=map[k]; t.revenue+=m.revenue; t.headcount+=m.headcount; t.dessertCount+=m.dessertCount; t.companionCount+=m.companionCount;
    });
    return Object.values(map).map(t=>({...t,avgSpend:t.headcount>0?Math.round(t.revenue/t.headcount):0,companionRate:t.headcount>0?(t.companionCount/t.headcount*100):0}));
  },[filtered]);

  // Monthly by main category
  const monthlyByCat = useMemo(()=>{
    const map={};
    filtered.forEach(m=>{
      const k=m.yearMonth+'|'+m.mainCategory;
      if(!map[k]) map[k]={ym:m.yearMonth,cat:m.mainCategory,revenue:0};
      map[k].revenue+=m.revenue;
    });
    return Object.values(map);
  },[filtered]);

  // Store totals
  const storeTotals = useMemo(()=>{
    const map={};
    filtered.forEach(m=>{
      if(!map[m.store]) map[m.store]={store:m.store,region:m.region,revenue:0,headcount:0,dessertCount:0,companionCount:0};
      const t=map[m.store]; t.revenue+=m.revenue; t.headcount+=m.headcount; t.dessertCount+=m.dessertCount; t.companionCount+=m.companionCount;
    });
    return Object.values(map).map(t=>({
      ...t, avgSpend:t.headcount>0?Math.round(t.revenue/t.headcount):0,
      companionRate:t.headcount>0?(t.companionCount/t.headcount*100):0
    })).sort((a,b)=>b.revenue-a.revenue);
  },[filtered]);

  // Category totals (exclude '找不到')
  const catTotals = useMemo(()=>{
    const map={};
    filtered.forEach(m=>{
      if(m.mainCategory==='找不到') return;
      if(!map[m.mainCategory]) map[m.mainCategory]={cat:m.mainCategory,revenue:0};
      map[m.mainCategory].revenue+=m.revenue;
    });
    return Object.values(map).sort((a,b)=>b.revenue-a.revenue);
  },[filtered]);

  // Product rank (all products)
  const filteredProducts = useMemo(()=>{
    if(!rawData) return [];
    return rawData.productRank;
  },[rawData]);

  // Sub-category (limited edition) totals — based on subCategory within 限定甜點
  const subCatTotals = useMemo(()=>{
    const map={};
    filtered.forEach(m=>{
      if(m.mainCategory!=='限定甜點') return;
      const label = (!m.subCategory || m.subCategory==='無' || m.subCategory==='找不到') ? '其他限定' : m.subCategory;
      if(!map[label]) map[label]={name:label,revenue:0};
      map[label].revenue+=m.revenue;
    });
    return Object.values(map).sort((a,b)=>b.revenue-a.revenue);
  },[filtered]);

  // Monthly limited vs regular — based on mainCategory==='限定甜點'
  const monthlyLimitedVsRegular = useMemo(()=>{
    const map={};
    filtered.forEach(m=>{
      if(!map[m.yearMonth]) map[m.yearMonth]={ym:m.yearMonth,limited:0,regular:0};
      if(m.mainCategory==='限定甜點') map[m.yearMonth].limited+=m.revenue;
      else map[m.yearMonth].regular+=m.revenue;
    });
    return Object.values(map).sort((a,b)=>a.ym<b.ym?-1:1);
  },[filtered]);

  // Price bands (from raw data)
  const priceBands = useMemo(()=>rawData?.priceBands||[],[rawData]);

  // Unique stores in filtered data
  const storesInData = useMemo(()=>{
    return [...new Set(filtered.map(m=>m.store))].sort();

  /* ---------- LOADING / ERROR ---------- */

      <header className="app-header">

          <div className="brand">
            <div>
              <h1>🧁 自己做烘焙聚樂部</h1>

        <div className="filters-bar">

            <select value={dateStart} onChange={e=>{setDateStart(e.target.value);setQuickDate('')}}>

          <div className="filter-group">

            <select value={dateEnd} onChange={e=>{setDateEnd(e.target.value);setQuickDate('')}}>
              {allMonths.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div className="filter-group">
            <label>快速選擇</label>
            <div className="quick-btns">
              {[['thisMonth','本月'],['lastMonth','上月'],['thisQ','本季'],['lastQ','上季'],['ytd','今年至今'],['lastYear','去年'],['all','全部']].map(([k,l])=>(
                <button key={k} className={'quick-btn'+(quickDate===k?' active':'')} onClick={()=>applyQuickDate(k)}>{l}</button>
              ))}
            </div>
          </div>
          <div className="filter-group">
            <label>區域</label>
            <select value={selRegion} onChange={e=>{setSelRegion(e.target.value);setSelStores([])}}>

          <div className="filter-group">

/* ================================================================
   TAB 1: 營收趨勢
   ================================================================ */
function TabRevenue({monthlyTotals, monthlyByStore, monthlyByCat, storesInData, catTotals}){
  const [viewMode, setViewMode] = useState('total'); // total | byStore

  // Revenue line chart data
  const revenueLineData = useMemo(()=>{
    if(viewMode==='total') return monthlyTotals.map(t=>({name:t.ym,revenue:t.revenue}));
    // By store: pivot
    const yms = [...new Set(monthlyByStore.map(m=>m.ym))].sort();
    const stores = [...new Set(monthlyByStore.map(m=>m.store))];
    return yms.map(ym=>{
      const row={name:ym};
      stores.forEach(s=>{
        const found = monthlyByStore.find(m=>m.ym===ym&&m.store===s);
        row[s] = found?found.revenue:0;
      });
      return row;
    });
  },[viewMode, monthlyTotals, monthlyByStore]);

  const storeList = useMemo(()=>[...new Set(monthlyByStore.map(m=>m.store))],[monthlyByStore]);

  // Stacked area by category
  const areaData = useMemo(()=>{
    const yms=[...new Set(monthlyByCat.map(m=>m.ym))].sort();
    const cats=[...new Set(monthlyByCat.map(m=>m.cat))];
    return { data: yms.map(ym=>{
      const row={name:ym};
      cats.forEach(c=>{
        const f=monthlyByCat.find(m=>m.ym===ym&&m.cat===c);
        row[c]=f?f.revenue:0;
      });
      return row;
    }), cats };
  },[monthlyByCat]);

  return (
    <div className="charts-grid cols-2">
      {/* 1. Revenue line */}
      <div className="chart-card full-width">
        <div className="chart-title">
          <span>每月營收趨勢</span>
          <div className="chart-toggle">
            <button className={viewMode==='total'?'active':''} onClick={()=>setViewMode('total')}>全店合計</button>
            <button className={viewMode==='byStore'?'active':''} onClick={()=>setViewMode('byStore')}>各店比較</button>
          </div>
        </div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={300}>
            <LineChart data={revenueLineData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis dataKey="name" stroke="#6b7280" tick={{fontSize:11}}/>
              <YAxis stroke="#6b7280" tick={{fontSize:11}} tickFormatter={fmt.short}/>
              <Tooltip content={<CustomTooltip formatter={fmt.currency}/>}/>
              {viewMode==='total' ? (
                <Line type="monotone" dataKey="revenue" stroke="#6366f1" strokeWidth={2.5} dot={{r:3}} name="營收"/>
              ) : (
                storeList.map((s,i)=>(
                  <Line key={s} type="monotone" dataKey={s} stroke={STORE_COLORS[i%STORE_COLORS.length]} strokeWidth={1.5} dot={false} name={s}/>
                ))
              )}
              {viewMode==='byStore' && <Legend wrapperStyle={{fontSize:11}}/>}
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 2. Headcount & avgSpend dual axis */}
      <div className="chart-card">
        <div className="chart-title">來客數 & 客單價</div>
        <div className="chart-subtitle">柱狀=來客數 / 折線=客單價</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={280}>
            <ComposedChart data={monthlyTotals}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis dataKey="ym" stroke="#6b7280" tick={{fontSize:10}}/>
              <YAxis yAxisId="left" stroke="#22c55e" tick={{fontSize:10}} tickFormatter={fmt.short}/>
              <YAxis yAxisId="right" orientation="right" stroke="#f59e0b" tick={{fontSize:10}} tickFormatter={v=>'$'+fmt.short(v)}/>
              <Tooltip content={<CustomTooltip formatter={v=>fmt.number(v)}/>}/>
              <Bar yAxisId="left" dataKey="headcount" fill="#22c55e" opacity={0.7} name="來客數" radius={[4,4,0,0]}/>
              <Line yAxisId="right" type="monotone" dataKey="avgSpend" stroke="#f59e0b" strokeWidth={2.5} dot={{r:3}} name="客單價"/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 3. Revenue structure stacked area */}
      <div className="chart-card">
        <div className="chart-title">營收結構（按主類別）</div>
        <div className="chart-subtitle">堆疊面積圖</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={280}>
            <AreaChart data={areaData.data}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis dataKey="name" stroke="#6b7280" tick={{fontSize:10}}/>
              <YAxis stroke="#6b7280" tick={{fontSize:10}} tickFormatter={fmt.short}/>
              <Tooltip content={<CustomTooltip formatter={fmt.currency}/>}/>
              {areaData.cats.map((c,i)=>(
                <Area key={c} type="monotone" dataKey={c} stackId="1" fill={CATEGORY_COLORS[i%CATEGORY_COLORS.length]} stroke={CATEGORY_COLORS[i%CATEGORY_COLORS.length]} fillOpacity={0.7} name={c}/>
              ))}
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 4. Companion rate trend */}
      <div className="chart-card">
        <div className="chart-title">陪同率月趨勢</div>

          <ResponsiveContainer width="100%" height={280}>
            <AreaChart data={monthlyTotals}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>

          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   TAB 2: 分店比較
   ================================================================ */
function TabStoreCompare({storeTotals, monthlyByStore, storesInData}){
  // Heatmap: store x month
  const heatmapData = useMemo(()=>{
    const yms=[...new Set(monthlyByStore.map(m=>m.ym))].sort();
    const stores=[...new Set(monthlyByStore.map(m=>m.store))];
    const map={};
    monthlyByStore.forEach(m=>{map[m.store+'|'+m.ym]=m.revenue});
    const maxRev = Math.max(...Object.values(map),1);
    return {yms, stores, map, maxRev};
  },[monthlyByStore]);

  function heatColor(val, max){
    const ratio = Math.min(val/max, 1);
    const r = Math.round(99 + ratio*0);
    const g = Math.round(102 - ratio*60);
    const b = Math.round(241);
    return `rgba(${r},${g},${b},${0.15+ratio*0.85})`;
  }

  return (
    <div className="charts-grid cols-2">
      {/* 1. Store revenue ranking */}
      <div className="chart-card">
        <div className="chart-title">各店營收排名</div>
        <div className="chart-subtitle">顏色區分區域</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={Math.max(280, storeTotals.length*32)}>
            <BarChart data={storeTotals} layout="vertical">
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis type="number" stroke="#6b7280" tick={{fontSize:10}} tickFormatter={fmt.short}/>
              <YAxis type="category" dataKey="store" width={160} stroke="#6b7280" tick={{fontSize:10}}/>
              <Tooltip content={<CustomTooltip formatter={fmt.currency}/>}/>
              <Bar dataKey="revenue" name="營收" radius={[0,4,4,0]}>
                {storeTotals.map((s,i)=><Cell key={i} fill={REGION_COLORS[s.region]||'#6b7280'}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 2. Store comparison: headcount + avgSpend + revenue (3 horizontal bars) */}
      <div className="chart-card">
        <div className="chart-title">各店來客數排名</div>
        <div className="chart-subtitle">甜點客＋陪同客合計</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={Math.max(280, storeTotals.length*32)}>
            <BarChart data={[...storeTotals].sort((a,b)=>b.headcount-a.headcount)} layout="vertical">
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis type="number" stroke="#6b7280" tick={{fontSize:10}} tickFormatter={fmt.short}/>
              <YAxis type="category" dataKey="store" width={160} stroke="#6b7280" tick={{fontSize:10}}/>
              <Tooltip content={<CustomTooltip formatter={fmt.number}/>}/>
              <Bar dataKey="headcount" name="來客數" radius={[0,4,4,0]}>
                {[...storeTotals].sort((a,b)=>b.headcount-a.headcount).map((s,i)=><Cell key={i} fill={REGION_COLORS[s.region]||'#6b7280'}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 3. Store avgSpend ranking */}
      <div className="chart-card">
        <div className="chart-title">各店客單價排名</div>
        <div className="chart-subtitle">營收 ÷ 來客數</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={Math.max(280, storeTotals.length*32)}>
            <BarChart data={[...storeTotals].sort((a,b)=>b.avgSpend-a.avgSpend)} layout="vertical">
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis type="number" stroke="#6b7280" tick={{fontSize:10}} tickFormatter={v=>'$'+fmt.short(v)}/>
              <YAxis type="category" dataKey="store" width={160} stroke="#6b7280" tick={{fontSize:10}}/>
              <Tooltip content={<CustomTooltip formatter={fmt.currency}/>}/>
              <Bar dataKey="avgSpend" name="客單價" radius={[0,4,4,0]}>
                {[...storeTotals].sort((a,b)=>b.avgSpend-a.avgSpend).map((s,i)=><Cell key={i} fill={REGION_COLORS[s.region]||'#6b7280'}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 4. Heatmap: store x month revenue */}
      <div className="chart-card full-width">
        <div className="chart-title">各店 × 各月營收熱力圖</div>
        <div className="chart-body" style={{overflow:'auto'}}>
          <div className="heatmap-grid" style={{gridTemplateColumns:`120px repeat(${heatmapData.yms.length},1fr)`,minWidth:heatmapData.yms.length*60+120}}>
            {/* Header row */}
            <div className="heatmap-cell" style={{fontWeight:700,fontSize:'.7rem'}}>門市 \ 月份</div>
            {heatmapData.yms.map(ym=><div key={ym} className="heatmap-cell" style={{fontWeight:600,fontSize:'.65rem'}}>{ym.substring(2)}</div>)}
            {/* Data rows */}
            {heatmapData.stores.map(store=>(
              <React.Fragment key={store}>
                <div className="heatmap-cell heatmap-label" title={store}>{store.length>8?store.substring(0,8)+'…':store}</div>
                {heatmapData.yms.map(ym=>{
                  const val = heatmapData.map[store+'|'+ym]||0;
                  return <div key={ym} className="heatmap-cell" style={{background:heatColor(val,heatmapData.maxRev)}} title={store+' '+ym+': '+fmt.currency(val)}>{val>0?fmt.short(val):''}</div>;
                })}
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>

      {/* 5. Companion rate by store */}
      <div className="chart-card full-width">
        <div className="chart-title">各店陪同率</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={280}>
            <BarChart data={storeTotals}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis dataKey="store" stroke="#6b7280" tick={{fontSize:9,angle:-30,textAnchor:'end'}} height={80}/>

              <Tooltip content={<CustomTooltip formatter={v=>fmt.pct(v)}/>}/>
              <Bar dataKey="companionRate" name="陪同率" radius={[4,4,0,0]}>
                {storeTotals.map((s,i)=><Cell key={i} fill={REGION_COLORS[s.region]||'#6b7280'}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   TAB 3: 品項分析
   ================================================================ */
function TabProductAnalysis({catTotals, filteredProducts}){
  const [rankMode, setRankMode] = useState('revenue'); // revenue | qty
  const [searchTerm, setSearchTerm] = useState('');
  const [sortCol, setSortCol] = useState('totalRevenue');
  const [sortDir, setSortDir] = useState('desc');

  const top20 = useMemo(()=>{
    const sorted = [...filteredProducts].sort((a,b)=>rankMode==='revenue'?b.totalRevenue-a.totalRevenue:b.totalQty-a.totalQty);
    return sorted.slice(0,20).reverse(); // reverse for horizontal bar
  },[filteredProducts, rankMode]);

  const tableData = useMemo(()=>{
    let data = filteredProducts;
    if(searchTerm){
      const term = searchTerm.toLowerCase();
      data = data.filter(p=>p.product.toLowerCase().includes(term)||p.mainCategory.toLowerCase().includes(term)||p.subCategory.toLowerCase().includes(term));
    }
    data = [...data].sort((a,b)=>{
      const av=a[sortCol], bv=b[sortCol];
      if(typeof av==='string') return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
      return sortDir==='asc'?av-bv:bv-av;
    });
    return data.slice(0,100);
  },[filteredProducts, searchTerm, sortCol, sortDir]);

  function handleSort(col){ if(sortCol===col) setSortDir(d=>d==='asc'?'desc':'asc'); else { setSortCol(col); setSortDir('desc'); } }
  const sortIcon = (col)=> sortCol===col ? (sortDir==='asc'?' ▲':' ▼') : '';

  return (
    <div className="charts-grid cols-2">
      {/* 1. Category donut */}
      <div className="chart-card">
        <div className="chart-title">主類別營收佔比</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={300}>
            <PieChart>
              <Pie data={catTotals} dataKey="revenue" nameKey="cat" cx="50%" cy="50%" innerRadius={60} outerRadius={110} paddingAngle={2} label={({cat,percent})=>`${cat} ${(percent*100).toFixed(0)}%`} labelLine={true} style={{fontSize:10}}>
                {catTotals.map((c,i)=><Cell key={i} fill={CATEGORY_COLORS[i%CATEGORY_COLORS.length]}/>)}
              </Pie>
              <Tooltip content={<CustomTooltip formatter={fmt.currency}/>}/>
            </PieChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 2. Top 20 products bar */}
      <div className="chart-card">
        <div className="chart-title">
          <span>TOP 20 暢銷甜點</span>
          <div className="chart-toggle">
            <button className={rankMode==='revenue'?'active':''} onClick={()=>setRankMode('revenue')}>依營收</button>
            <button className={rankMode==='qty'?'active':''} onClick={()=>setRankMode('qty')}>依銷量</button>
          </div>
        </div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={Math.max(300,top20.length*24)}>
            <BarChart data={top20} layout="vertical">
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis type="number" stroke="#6b7280" tick={{fontSize:10}} tickFormatter={rankMode==='revenue'?fmt.short:fmt.number}/>
              <YAxis type="category" dataKey="product" width={140} stroke="#6b7280" tick={{fontSize:9}}/>
              <Tooltip content={<CustomTooltip formatter={rankMode==='revenue'?fmt.currency:fmt.number}/>}/>
              <Bar dataKey={rankMode==='revenue'?'totalRevenue':'totalQty'} name={rankMode==='revenue'?'營收':'銷量'} fill="#8b5cf6" radius={[0,4,4,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 3. Product table */}
      <div className="chart-card full-width">
        <div className="chart-title">甜點明細表</div>
        <input className="search-input" placeholder="搜尋商品名稱、主類別、次類別…" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
        <div className="data-table-wrap">
          <table className="data-table">
            <thead>
              <tr>
                <th onClick={()=>handleSort('product')}>商品名稱{sortIcon('product')}</th>
                <th onClick={()=>handleSort('mainCategory')}>主類別{sortIcon('mainCategory')}</th>
                <th onClick={()=>handleSort('subCategory')}>次類別{sortIcon('subCategory')}</th>
                <th onClick={()=>handleSort('avgPrice')}>均價{sortIcon('avgPrice')}</th>
                <th onClick={()=>handleSort('totalQty')}>銷量{sortIcon('totalQty')}</th>
                <th onClick={()=>handleSort('totalRevenue')}>營收{sortIcon('totalRevenue')}</th>
                <th onClick={()=>handleSort('storeCount')}>門市數{sortIcon('storeCount')}</th>
              </tr>
            </thead>
            <tbody>
              {tableData.map((p,i)=>(
                <tr key={i}>
                  <td>{p.product}</td>
                  <td>{p.mainCategory}</td>
                  <td>{p.subCategory||'—'}</td>
                  <td style={{textAlign:'right'}}>{fmt.currency(p.avgPrice)}</td>
                  <td style={{textAlign:'right'}}>{fmt.number(p.totalQty)}</td>
                  <td style={{textAlign:'right'}}>{fmt.currency(p.totalRevenue)}</td>
                  <td style={{textAlign:'center'}}>{p.storeCount}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   TAB 4: 客單價分析
   ================================================================ */
function TabAvgSpend({priceBands, storeTotals, monthlyByStore, storesInData, overallAvg}){
  // Store avg spend monthly
  const storeMonthlyAvg = useMemo(()=>{
    const yms=[...new Set(monthlyByStore.map(m=>m.ym))].sort();
    const stores=[...new Set(monthlyByStore.map(m=>m.store))];
    // Aggregate by store+month
    const map={};
    monthlyByStore.forEach(m=>{
      const k=m.ym+'|'+m.store;
      if(!map[k]) map[k]={ym:m.ym,store:m.store,revenue:0,headcount:0};
      map[k].revenue+=m.revenue; map[k].headcount+=m.headcount;
    });
    return {
      data: yms.map(ym=>{
        const row={name:ym};
        stores.forEach(s=>{
          const f=map[ym+'|'+s];
          row[s]=f&&f.headcount>0?Math.round(f.revenue/f.headcount):0;
        });
        return row;
      }),
      stores
    };
  },[monthlyByStore]);

  return (
    <div className="charts-grid cols-2">
      {/* 1. Price band histogram */}
      <div className="chart-card">
        <div className="chart-title">甜點單價分布</div>
        <div className="chart-subtitle">5 個價題帶</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={280}>
            <BarChart data={priceBands}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis dataKey="band" stroke="#6b7280" tick={{fontSize:11}}/>
              <YAxis stroke="#6b7280" tick={{fontSize:10}} tickFormatter={fmt.short}/>
              <Tooltip content={<CustomTooltip formatter={fmt.number}/>}/>
              <Bar dataKey="count" name="數量" fill="#8b5cf6" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 2. Store avg spend bar + overall avg line */}
      <div className="chart-card">
        <div className="chart-title">各店客單價</div>
        <div className="chart-subtitle">虛線＝全店平均 {fmt.currency(overallAvg)}</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={280}>
            <ComposedChart data={storeTotals}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis dataKey="store" stroke="#6b7280" tick={{fontSize:9,angle:-30,textAnchor:'end'}} height={80}/>
              <YAxis stroke="#6b7280" tick={{fontSize:10}} tickFormatter={v=>'$'+fmt.short(v)}/>
              <Tooltip content={<CustomTooltip formatter={fmt.currency}/>}/>
              <Bar dataKey="avgSpend" name="客單價" radius={[4,4,0,0]}>
                {storeTotals.map((s,i)=><Cell key={i} fill={REGION_COLORS[s.region]||'#6b7280'}/>)}
              </Bar>
              <ReferenceLine y={overallAvg} stroke="#ef4444" strokeDasharray="5 5" label={{value:'全店平均',fill:'#ef4444',fontSize:11}}/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 3. Store avg spend monthly trend */}
      <div className="chart-card full-width">
        <div className="chart-title">各店客單價月趨勢</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={320}>
            <LineChart data={storeMonthlyAvg.data}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis dataKey="name" stroke="#6b7280" tick={{fontSize:10}}/>
              <YAxis stroke="#6b7280" tick={{fontSize:10}} tickFormatter={v=>'$'+fmt.short(v)}/>
              <Tooltip content={<CustomTooltip formatter={fmt.currency}/>}/>
              <Legend wrapperStyle={{fontSize:10}}/>
              {storeMonthlyAvg.stores.map((s,i)=>(
                <Line key={s} type="monotone" dataKey={s} stroke={STORE_COLORS[i%STORE_COLORS.length]} strokeWidth={1.5} dot={false} name={s}/>
              ))}
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   TAB 5: 季節 & 活動
   ================================================================ */
function TabSeasonal({subCatTotals, monthlyLimitedVsRegular, filteredDaily}){
  // Calendar heatmap
  const calendarData = useMemo(()=>{
    if(!filteredDaily.length) return {months:[],map:{},maxRev:1};
    const map={};
    let maxRev=0;
    filteredDaily.forEach(d=>{map[d.date]=d.revenue; if(d.revenue>maxRev) maxRev=d.revenue});
    // Group by month
    const monthSet={};
    filteredDaily.forEach(d=>{const m=d.date.substring(0,7); if(!monthSet[m]) monthSet[m]=true});
    const months=Object.keys(monthSet).sort();
    return {months,map,maxRev};
  },[filteredDaily]);

  function calColor(val,max){
    if(!val) return 'rgba(99,102,241,0.08)';
    const ratio=Math.min(val/max,1);
    return `rgba(99,102,241,${0.15+ratio*0.85})`;
  }

  // top limited edition events (filter out 其他限定 and 找不到)
  const limitedEvents = useMemo(()=>{
    return subCatTotals.filter(s=>s.name!=='其他限定' && s.name!=='找不到').slice(0,15);
  },[subCatTotals]);

  return (
    <div className="charts-grid cols-2">
      {/* 1. Limited event revenue comparison */}
      <div className="chart-card">
        <div className="chart-title">活動檔期營收對比</div>
        <div className="chart-subtitle">TOP 15 限定檔期（次類別）</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={Math.max(280, limitedEvents.length*28)}>
            <BarChart data={[...limitedEvents].reverse()} layout="vertical">
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis type="number" stroke="#6b7280" tick={{fontSize:10}} tickFormatter={fmt.short}/>
              <YAxis type="category" dataKey="name" width={140} stroke="#6b7280" tick={{fontSize:9}}/>
              <Tooltip content={<CustomTooltip formatter={fmt.currency}/>}/>
              <Bar dataKey="revenue" name="營收" fill="#d946ef" radius={[0,4,4,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 2. Limited vs regular area */}
      <div className="chart-card">
        <div className="chart-title">限定甜點 vs 常態品營收</div>
        <div className="chart-subtitle">面積圖趨勢對比</div>
        <div className="chart-body">
          <ResponsiveContainer width="100%" height={280}>
            <AreaChart data={monthlyLimitedVsRegular}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3148"/>
              <XAxis dataKey="ym" stroke="#6b7280" tick={{fontSize:10}}/>
              <YAxis stroke="#6b7280" tick={{fontSize:10}} tickFormatter={fmt.short}/>
              <Tooltip content={<CustomTooltip formatter={fmt.currency}/>}/>
              <Area type="monotone" dataKey="regular" stackId="1" fill="#6366f1" stroke="#6366f1" fillOpacity={0.7} name="常態品"/>
              <Area type="monotone" dataKey="limited" stackId="1" fill="#d946ef" stroke="#d946ef" fillOpacity={0.7} name="限定甜點"/>
              <Legend wrapperStyle={{fontSize:11}}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 3. Calendar heatmap */}
      <div className="chart-card full-width">
        <div className="chart-title">每日營收日曄熱力圖</div>
        <div className="chart-subtitle">顏色越深＝營收越高</div>
        <div className="chart-body" style={{overflow:'auto'}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:16,padding:8}}>
            {calendarData.months.map(month=>{
              const [y,m]=month.split('-').map(Number);
              const firstDay=new Date(y,m-1,1).getDay(); // 0=Sun
              const daysInMonth=new Date(y,m,0).getDate();
              const cells=[];
              for(let i=0;i<firstDay;i++) cells.push(<div key={'e'+i} style={{width:14,height:14}}/>);
              for(let d=1;d<=daysInMonth;d++){
                const dateStr=month+'-'+(d<10?'0':'')+d;
                const val=calendarData.map[dateStr]||0;
                cells.push(
                  <div key={d} className="cal-cell"
                    style={{background:calColor(val,calendarData.maxRev)}}
                    title={dateStr+': '+fmt.currency(val)}/>
                );
              }
              return (
                <div key={month} style={{minWidth:112}}>
                  <div className="cal-month-label">{month}</div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(7,14px)',gap:2}}>
                    {['日','一','二','三','四','五','六'].map(d=><div key={d} style={{fontSize:'.55rem',color:'var(--text-muted)',textAlign:'center',height:14,lineHeight:'14px'}}>{d}</div>)}
                    {cells}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

   RENDER

</script>
